        // [CORE FIX: ABSOLUTE CLIPBOARD FALLBACK]
        const copyToClipboard = (text) => {
            if (navigator.clipboard && window.isSecureContext) {
                navigator.clipboard.writeText(text).catch(() => fallbackCopy(text));
            } else { fallbackCopy(text); }
        };

        const fallbackCopy = (text) => {
            const textArea = document.createElement("textarea"); textArea.value = text;
            textArea.style.top = "0"; textArea.style.left = "0"; textArea.style.position = "fixed";
            document.body.appendChild(textArea); textArea.focus(); textArea.select();
            try { document.execCommand('copy'); } catch (err) {}
            document.body.removeChild(textArea);
        };

        // [CORE FIX: COMPRESSION ENGINE (Mencegah Infinite Hang E2EE)]
        const compressImage = async (file) => {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (e) => {
                    const img = new Image();
                    img.src = e.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 1080; // Resolusi aman E2EE
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        canvas.toBlob(blob => resolve(blob), 'image/jpeg', 0.75); // Kualitas 75%
                    };
                    img.onerror = () => reject(new Error("File bukan gambar valid."));
                };
                reader.onerror = () => reject(new Error("Gagal membaca file."));
            });
        };

        class ErrorBoundary extends React.Component {
            constructor(props) { super(props); this.state = { hasError: false, error: null }; }
            static getDerivedStateFromError(error) { return { hasError: true, error }; }
            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{ padding: '24px', backgroundColor: '#000', color: '#ff453a', height: '100%', width: '100%', display: 'flex', flexDirection: 'column', justifyContent: 'center', alignItems: 'center', fontFamily: 'monospace', textAlign: 'center' }}>

                                {this.state.error?.toString()}

                        </div>
                    );
                }
                return this.props.children;
            }
        }

        const CryptoUtils = {
            async generateKeypair() { return await window.crypto.subtle.generateKey({ name: "ECDH", namedCurve: "P-256" }, true, ["deriveKey", "deriveBits"]); },
            async exportKeyJWK(key) { return await window.crypto.subtle.exportKey("jwk", key); },
            async importPublicKey(jwk) { return await window.crypto.subtle.importKey("jwk", jwk, { name: "ECDH", namedCurve: "P-256" }, true, []); },
            async importPrivateKey(jwk) { return await window.crypto.subtle.importKey("jwk", jwk, { name: "ECDH", namedCurve: "P-256" }, true, ["deriveKey", "deriveBits"]); },
            async deriveWrapKey(passphrase, salt) {
                const enc = new TextEncoder();
                const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(passphrase), { name: "PBKDF2" }, false, ["deriveKey"]);
                return await crypto.subtle.deriveKey({ name: "PBKDF2", salt: enc.encode(salt), iterations: 20000, hash: "SHA-256" }, keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]);
            },
            async deriveSharedSecret(privateKey, publicKeyJWK) {
                const publicKey = await this.importPublicKey(publicKeyJWK);
                return await window.crypto.subtle.deriveKey({ name: "ECDH", public: publicKey }, privateKey, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]);
            },
            async encryptText(text, sharedKey) {
                const iv = window.crypto.getRandomValues(new Uint8Array(12));
                const ciphertext = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, sharedKey, new TextEncoder().encode(text));
                return { type: 'text', iv: Array.from(iv), data: Array.from(new Uint8Array(ciphertext)) };
            },
            async encryptBinary(arrayBuffer, sharedKey, fileType) {
                const iv = window.crypto.getRandomValues(new Uint8Array(12));
                const ciphertext = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, sharedKey, arrayBuffer);
                const base64String = btoa(new Uint8Array(ciphertext).reduce((data, byte) => data + String.fromCharCode(byte), ''));
                return { type: fileType, iv: Array.from(iv), data: base64String };
            },
            async decryptPayload(payload, sharedKey) {
                try {
                    const iv = new Uint8Array(payload.iv);
                    if (['audio', 'image', 'video'].includes(payload.type)) {
                        const binaryStr = atob(payload.data);
                        const encryptedBytes = new Uint8Array(binaryStr.length);
                        for (let i = 0; i < binaryStr.length; i++) encryptedBytes[i] = binaryStr.charCodeAt(i);
                        const decrypted = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, sharedKey, encryptedBytes);
                        let mime = payload.type === 'audio' ? 'audio/webm' : payload.type === 'image' ? 'image/jpeg' : 'video/mp4';
                        return { type: payload.type, data: new Blob([decrypted], { type: mime }) };
                    } else {
                        const decrypted = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, sharedKey, new Uint8Array(payload.data || payload));
                        return { type: 'text', data: new TextDecoder().decode(decrypted) };
                    }
                } catch (e) { return { type: 'error', data: "🔒 Decryption Failed" }; }
            },
            async generateStoryKey() {
                const rawKey = window.crypto.getRandomValues(new Uint8Array(32));
                return { rawKey, cryptoKey: await crypto.subtle.importKey("raw", rawKey, "AES-GCM", true, ["encrypt", "decrypt"]) };
            },
            async encryptStoryMedia(arrayBuffer, cryptoKey) {
                const iv = window.crypto.getRandomValues(new Uint8Array(12));
                const ciphertext = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, cryptoKey, arrayBuffer);
                return { iv: Array.from(iv), blob: new Blob([ciphertext], { type: 'application/octet-stream' }) };
            },
            async decryptStoryMedia(encryptedBlob, ivArray, rawKeyArray) {
                const cryptoKey = await crypto.subtle.importKey("raw", new Uint8Array(rawKeyArray), "AES-GCM", false, ["decrypt"]);
                return await crypto.subtle.decrypt({ name: "AES-GCM", iv: new Uint8Array(ivArray) }, cryptoKey, await encryptedBlob.arrayBuffer());
            },
            async wrapKeyForFriend(rawKey, sharedSecret) {
                const iv = window.crypto.getRandomValues(new Uint8Array(12));
                const wrapped = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, sharedSecret, rawKey);
                return { iv: Array.from(iv), wrapped: Array.from(new Uint8Array(wrapped)) };
            },
            async unwrapKeyFromFriend(wrappedData, sharedSecret) {
                const rawKey = await crypto.subtle.decrypt({ name: "AES-GCM", iv: new Uint8Array(wrappedData.iv) }, sharedSecret, new Uint8Array(wrappedData.wrapped));
                return Array.from(new Uint8Array(rawKey));
            }
        };

                            setIdentity({ ...localData, privateKey: privKey });
                            setAuthView("main");
                        }
                        setFbReady(true);
                    } catch (e) { console.error(e); }
                };
                init();
            }, []);

            React.useEffect(() => {
                if (activeModal === 'profile' && identity && document.getElementById('qr-container')) {
                    document.getElementById('qr-container').innerHTML = "";
                    new QRCode(document.getElementById('qr-container'), { text: identity.code, width: 140, height: 140, colorDark : "#000", colorLight : "#fff", correctLevel : QRCode.CorrectLevel.H });
                }
            }, [activeModal, identity]);

            // Scanner UseEffect
            React.useEffect(() => {
                let scanner;
                if (isScanning && document.getElementById('reader')) {
                    scanner = new Html5Qrcode("reader");
                    scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } }, (text) => {
                        setAddCodeInput(text); scanner.stop(); setIsScanning(false); showToast("QR Terbaca!", "ph-check");
                    }, (err) => {}).catch(e => { showToast("Gagal akses kamera", "ph-warning"); setIsScanning(false); });
                }
                return () => { if (scanner && scanner.isScanning) scanner.stop().catch(()=>{}); };
            }, [isScanning]);

            React.useEffect(() => {
                if (!fbReady || !identity || authView !== "main") return;
                const { db, fbDb } = fbModules;
                const unsubContacts = fbDb.onSnapshot(fbDb.collection(db, 'users', identity.code, 'contacts'), (snap) => setFriends(snap.docs.map(d => d.data())));
                const unsubStories = fbDb.onSnapshot(fbDb.query(fbDb.collection(db, 'stories'), fbDb.where('expiresAt', '>', Date.now())), async (snap) => {
                    let fetched = snap.docs.map(d => ({ id: d.id, ...d.data() })).filter(s => s.sender === identity.code || s.encryptedKeys[identity.code]);
                    const grouped = {};
                    fetched.forEach(s => { if (!grouped[s.sender]) grouped[s.sender] = []; grouped[s.sender].push(s); });
                    const final = [];
                    for (let sender in grouped) {
                        grouped[sender].sort((a,b) => a.timestamp - b.timestamp);
                        const friend = sender === identity.code ? identity : friends.find(f => f.code === sender);
                        if (friend) final.push({ senderCode: sender, displayName: friend.displayName, avatarUrl: friend.avatarUrl, items: grouped[sender] });
                    }
                    final.sort((a, b) => {
                        if (a.senderCode === identity.code) return -1;
                        if (b.senderCode === identity.code) return 1;
                        return b.items[b.items.length-1].timestamp - a.items[a.items.length-1].timestamp;
                    });
                    setStories(final);
                });
                return () => { unsubContacts(); unsubStories(); };
            }, [fbReady, identity, authView, friends.length]);

            React.useEffect(() => {
                if (!fbReady || !identity || !activeChat || authView !== "main" || activeTab !== 'chats') return;
                const { db, fbDb } = fbModules;
                const chatId = [identity.code, activeChat.code].sort().join('_');
                
                const unsubChat = fbDb.onSnapshot(fbDb.collection(db, `chats_${chatId}`), async (snapshot) => {
                    let msgs = snapshot.docs.map(d => ({ id: d.id, ...d.data() })).filter(m => !(m.deletedFor || []).includes(identity.code));
                    msgs.sort((a, b) => a.timestamp - b.timestamp);
                    setMessages(msgs);

                    const sharedSecret = await CryptoUtils.deriveSharedSecret(identity.privateKey, activeChat.publicKeyJWK);
                    const newDecrypted = { ...decryptedCache };
                    let changed = false;

                    for (let msg of msgs) {
                        if (!newDecrypted[msg.id]) {
                            const clearData = await CryptoUtils.decryptPayload(msg.payload, sharedSecret);
                            if (['audio', 'image', 'video'].includes(clearData.type)) newDecrypted[msg.id] = { type: clearData.type, url: URL.createObjectURL(clearData.data) };
                            else newDecrypted[msg.id] = { type: 'text', text: clearData.data };
                            changed = true;
                        }
                    }
                    if (changed) setDecryptedCache(newDecrypted);
                });

                const unsubSignal = fbDb.onSnapshot(fbDb.doc(db, `chats_${chatId}_signal`, 'room'), (doc) => {
                    const data = doc.data();
                    if (!data) return;
                    if (data.offer && data.caller !== identity.code && !rtcState) {
                        setCallType(data.callType || 'video'); setRtcState('receiving');
                    }
                    if (data.hangup && rtcState) { endCallCleanup(); }
                });

                return () => { unsubChat(); unsubSignal(); endCallCleanup(); };
            }, [fbReady, identity, activeChat, authView, activeTab]);

            const handleRegister = async (e) => {
                e.preventDefault();
                const code = Array.from(window.crypto.getRandomValues(new Uint8Array(4))).map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
                const keypair = await CryptoUtils.generateKeypair();
                const pubJWK = await CryptoUtils.exportKeyJWK(keypair.publicKey);
                const privJWK = await CryptoUtils.exportKeyJWK(keypair.privateKey);
                const passphrase = Array.from({length: 4}, () => DICT[Math.floor(Math.random() * DICT.length)]).join("-");
                const wrapKey = await CryptoUtils.deriveWrapKey(passphrase, code);
                const encryptedPriv = await CryptoUtils.encryptText(JSON.stringify(privJWK), wrapKey);

                setGeneratedRecoveryKey(`${code}-${passphrase}`);
                const data = { code, displayName: setupName.trim(), publicKeyJWK: pubJWK, encryptedPrivKey: encryptedPriv, avatarUrl: null };
                await fbModules.fbDb.setDoc(fbModules.fbDb.doc(fbModules.db, 'users', code), { ...data, createdAt: Date.now() });
                await LocalDB.saveIdentity({ ...data, privateKeyJWK: privJWK });
                setIdentity({ ...data, privateKey: keypair.privateKey, privateKeyJWK: privJWK });
                setAuthView("key_reveal");
            };

            const handleRestore = async (e) => {
                e.preventDefault();
                try {
                    // BRUTAL SANITIZER: Only keep alphanumeric and dashes
                    const input = recoveryKeyInput.replace(/[^a-zA-Z0-9-]/g, ''); 
                    const parts = input.split('-');
                    if(parts.length < 2) throw new Error("Format Salah");
                    const code = parts[0].toUpperCase();
                    const pass = parts.slice(1).join('-').toLowerCase();
                    
                    const snap = await fbModules.fbDb.getDoc(fbModules.fbDb.doc(fbModules.db, 'users', code));
                    if (!snap.exists()) throw new Error("ID Tidak Ditemukan.");
                    const data = snap.data();
                    const wrapKey = await CryptoUtils.deriveWrapKey(pass, code);
                    const decStr = await CryptoUtils.decryptPayload(data.encryptedPrivKey, wrapKey);
                    if (decStr.type === 'error') throw new Error("Kunci Salah.");
                    const privJWK = JSON.parse(decStr.data);
                    const privKey = await CryptoUtils.importPrivateKey(privJWK);
                    await LocalDB.saveIdentity({ ...data, privateKeyJWK: privJWK });
                    setIdentity({ ...data, privateKey: privKey, privateKeyJWK: privJWK });
                    setAuthView("main");
                } catch (err) { showToast(err.message, "ph-warning"); }
            };

            const [editProfileName, setEditProfileName] = React.useState("");
            const [isEditingProfile, setIsEditingProfile] = React.useState(false);

            const handleUpdateProfile = async (e) => {
                e.preventDefault();
                const newName = editProfileName.trim();
                await fbModules.fbDb.updateDoc(fbModules.fbDb.doc(fbModules.db, 'users', identity.code), { displayName: newName });
                const updated = { ...identity, displayName: newName };
                await LocalDB.saveIdentity(updated);
                setIdentity(updated);
                setIsEditingProfile(false);
                showToast("Profil Diperbarui!");
            };

            const handleAvatarUpload = async (e) => {
                const file = e.target.files[0];
                if(!file) return;
                setToast({msg: "Uploading...", icon: "ph-spinner animate-spin"});
                try {
                    const compressedBlob = await compressImage(file);
                    const ref = fbModules.fbStorage.ref(fbModules.storage, `avatars/${identity.code}_${Date.now()}`);
                    await fbModules.fbStorage.uploadBytes(ref, compressedBlob);
                    const url = await fbModules.fbStorage.getDownloadURL(ref);
                    await fbModules.fbDb.updateDoc(fbModules.fbDb.doc(fbModules.db, 'users', identity.code), { avatarUrl: url });
                    const updated = { ...identity, avatarUrl: url };
                    await LocalDB.saveIdentity(updated);
                    setIdentity(updated);
                    showToast("Avatar Berubah!");
                } catch(e) { showToast("Gagal unggah foto.", "ph-warning"); }
            };

            const processAddFriend = async (e) => {
                e.preventDefault();
                const code = addCodeInput.trim().toUpperCase();
                if (code === identity.code) return showToast("Dilarang ID Sendiri", "ph-warning");
                try {
                    const snap = await fbModules.fbDb.getDoc(fbModules.fbDb.doc(fbModules.db, 'users', code));
                    if (!snap.exists()) return showToast("Target Tidak Ditemukan", "ph-warning");
                    const target = snap.data();
                    
                    await fbModules.fbDb.setDoc(fbModules.fbDb.doc(fbModules.db, 'users', identity.code, 'contacts', code), {
                        code: target.code, displayName: target.displayName, publicKeyJWK: target.publicKeyJWK, avatarUrl: target.avatarUrl || null
                    });
                    fbModules.fbDb.setDoc(fbModules.fbDb.doc(fbModules.db, 'users', code, 'contacts', identity.code), {
                        code: identity.code, displayName: identity.displayName, publicKeyJWK: identity.publicKeyJWK, avatarUrl: identity.avatarUrl || null
                    }).catch(()=>{});

                    setActiveModal(null); setAddCodeInput(""); showToast("Kontak Ditambahkan!", "ph-check");
                } catch (err) { showToast("Koneksi Gagal", "ph-warning"); }
            };

            // [STORY LOGIC FIXED: Compression & Safe Tries]
            const handleStoryImageSelect = async (e) => { 
                if(e.target.files[0]) {
                    setToast({msg: "Memproses Foto...", icon: "ph-spinner animate-spin"});
                    try {
                        const compressed = await compressImage(e.target.files[0]);
                        setStoryImageBlob(compressed);
                    } catch(err) { showToast(err.message, "ph-warning"); }
                    finally { setToast(null); }
                }
            };
            const handleStoryAudioSelect = (e) => { 
                if(e.target.files[0]) {
                    if (e.target.files[0].size > 3 * 1024 * 1024) return showToast("Max Audio 3MB", "ph-warning");
                    setStoryAudioBlob(e.target.files[0]); 
                }
            };

            const startStoryAudioRecord = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    storyAudioRecorderRef.current = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                    storyAudioChunksRef.current = [];
                    
                    storyAudioRecorderRef.current.ondataavailable = e => { storyAudioChunksRef.current.push(e.data); };
                    storyAudioRecorderRef.current.onstop = () => {
                        const blob = new Blob(storyAudioChunksRef.current, { type: 'audio/webm' });
                        setStoryAudioBlob(blob);
                        stream.getTracks().forEach(t => t.stop());
                    };
                    
                    storyAudioRecorderRef.current.start();
                    setIsRecordingStoryAudio(true);
                    setStoryRecTime(0);
                    
                    storyTimerRef.current = setInterval(() => setStoryRecTime(t => t + 1), 1000);
                    storyAutoStopRef.current = setTimeout(() => { stopStoryAudioRecord(); }, 60000);
                } catch(e) { showToast("Akses Mic Ditolak", "ph-warning"); }
            };

            const stopStoryAudioRecord = () => {
                if (storyAudioRecorderRef.current && storyAudioRecorderRef.current.state === "recording") {
                    storyAudioRecorderRef.current.stop();
                    setIsRecordingStoryAudio(false);
                    clearInterval(storyTimerRef.current);
                    clearTimeout(storyAutoStopRef.current);
                }
            };

            const publishMultipartStory = async () => {
                if (!storyImageBlob) return showToast("Pilih Foto Dahulu!", "ph-warning");
                setToast({msg: "Menyiapkan E2EE Payload...", icon: "ph-spinner animate-spin"});
                const { db, fbDb, storage, fbStorage } = fbModules;
                try {
                    const { rawKey, cryptoKey } = await CryptoUtils.generateStoryKey();
                    let payloadData = { isText: false, mediaType: 'multipart' };

                    const { iv: imgIv, blob: imgBlob } = await CryptoUtils.encryptStoryMedia(await storyImageBlob.arrayBuffer(), cryptoKey);
                    const imgRef = fbStorage.ref(storage, `stories/${identity.code}_img_${Date.now()}`);
                    await fbStorage.uploadBytes(imgRef, imgBlob);
                    payloadData.imgUrl = await fbStorage.getDownloadURL(imgRef);
                    payloadData.imgIv = imgIv;

                    if (storyAudioBlob) {
                        const { iv: audIv, blob: audBlob } = await CryptoUtils.encryptStoryMedia(await storyAudioBlob.arrayBuffer(), cryptoKey);
                        const audRef = fbStorage.ref(storage, `stories/${identity.code}_aud_${Date.now()}`);
                        await fbStorage.uploadBytes(audRef, audBlob);
                        payloadData.audUrl = await fbStorage.getDownloadURL(audRef);
                        payloadData.audIv = audIv;
                    }

                    const encryptedKeys = {};
                    for (let target of [...friends, identity]) {
                        const sharedSecret = await CryptoUtils.deriveSharedSecret(identity.privateKey, target.publicKeyJWK);
                        encryptedKeys[target.code] = await CryptoUtils.wrapKeyForFriend(rawKey, sharedSecret);
                    }

                    await fbDb.addDoc(fbDb.collection(db, 'stories'), { sender: identity.code, timestamp: Date.now(), expiresAt: Date.now() + 86400000, encryptedKeys, payload: payloadData });
                    
                    closeStoryCreator(); 
                    showToast("Status Terkirim!", "ph-check-circle");
                } catch (e) { 
                    showToast(`Upload Error`, "ph-warning"); 
                } finally { setToast(null); } // FIX: Ensure toast clears
            };

            const closeStoryCreator = () => {
                setStoryMode(null); setStoryImageBlob(null); setStoryAudioBlob(null); setIsRecordingStoryAudio(false);
                clearInterval(storyTimerRef.current); clearTimeout(storyAutoStopRef.current);
            };

            const loadAndDecryptStory = async (storyDoc, senderCode) => {
                setCurrentStoryContent(null); setStoryProgress(0);
                if(storyIntervalRef.current) clearInterval(storyIntervalRef.current);
                try {
                    const myKeyWrapper = storyDoc.encryptedKeys[identity.code];
                    const targetData = senderCode === identity.code ? identity : friends.find(f => f.code === senderCode);
                    const sharedSecret = await CryptoUtils.deriveSharedSecret(identity.privateKey, targetData.publicKeyJWK);
                    const rawStoryKeyArray = await CryptoUtils.unwrapKeyFromFriend(myKeyWrapper, sharedSecret);
                    const payload = storyDoc.payload;

                    const cryptoKey = await crypto.subtle.importKey("raw", new Uint8Array(rawStoryKeyArray), "AES-GCM", false, ["decrypt"]);
                    let contentResult = { type: 'multipart', imgUrl: null, audUrl: null };

                    if (payload.imgUrl) {
                        const res = await fetch(payload.imgUrl);
                        const decBuf = await CryptoUtils.decryptStoryMedia(await res.blob(), payload.imgIv, rawStoryKeyArray);
                        contentResult.imgUrl = URL.createObjectURL(new Blob([decBuf], {type: 'image/jpeg'}));
                    }
                    if (payload.audUrl) {
                        const res = await fetch(payload.audUrl);
                        const decBuf = await CryptoUtils.decryptStoryMedia(await res.blob(), payload.audIv, rawStoryKeyArray);
                        contentResult.audUrl = URL.createObjectURL(new Blob([decBuf], {type: 'audio/webm'}));
                    }
                    
                    setCurrentStoryContent(contentResult);
                    if (!payload.audUrl) startStoryTimer(5000);
                } catch (e) { setCurrentStoryContent({ type: 'error', text: "Gagal dekripsi." }); startStoryTimer(3000); }
            };

            const startStoryTimer = (duration) => {
                let start = Date.now();
                storyIntervalRef.current = setInterval(() => {
                    let prog = ((Date.now() - start) / duration) * 100;
                    if (prog >= 100) { clearInterval(storyIntervalRef.current); nextStory(); } else setStoryProgress(prog);
                }, 50);
            };
            const nextStory = () => { if (viewingStoryIdx < activeStoryGroup.length - 1) { setViewingStoryIdx(v => v + 1); loadAndDecryptStory(activeStoryGroup[viewingStoryIdx + 1], activeStoryGroup[0].senderCode); } else closeStoryViewer(); };
            const prevStory = () => { if (viewingStoryIdx > 0) { setViewingStoryIdx(v => v - 1); loadAndDecryptStory(activeStoryGroup[viewingStoryIdx - 1], activeStoryGroup[0].senderCode); } };
            const closeStoryViewer = () => { if(storyIntervalRef.current) clearInterval(storyIntervalRef.current); setStoryMode(null); setActiveStoryGroup([]); };

            const sendEncryptedPayload = async (payloadData) => {
                const { db, fbDb } = fbModules;
                const chatId = [identity.code, activeChat.code].sort().join('_');
                await fbDb.addDoc(fbDb.collection(db, `chats_${chatId}`), { sender: identity.code, timestamp: Date.now(), payload: payloadData, status: 'sent' });
            };

            const handleSendText = async (e) => {
                e.preventDefault();
                if (!inputText.trim() || !activeChat) return;
                const text = inputText.trim(); setInputText("");
                const sharedSecret = await CryptoUtils.deriveSharedSecret(identity.privateKey, activeChat.publicKeyJWK);
                const encryptedPayload = await CryptoUtils.encryptText(text, sharedSecret);
                await sendEncryptedPayload(encryptedPayload);
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if(!file || !activeChat) return;
                try {
                    const compressed = file.type.startsWith('image/') ? await compressImage(file) : file;
                    const arrayBuffer = await compressed.arrayBuffer();
                    const sharedSecret = await CryptoUtils.deriveSharedSecret(identity.privateKey, activeChat.publicKeyJWK);
                    const type = file.type.startsWith('image/') ? 'image' : file.type.startsWith('video/') ? 'video' : 'error';
                    const encryptedData = await CryptoUtils.encryptBinary(arrayBuffer, sharedSecret, type);
                    await sendEncryptedPayload(encryptedData);
                } catch (err) {} finally { e.target.value = ''; }
            };

            const startRecording = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorderRef.current = new MediaRecorder(stream, { mimeType: 'audio/webm' }); audioChunksRef.current = [];
                    mediaRecorderRef.current.ondataavailable = (e) => { audioChunksRef.current.push(e.data); };
                    mediaRecorderRef.current.onstop = async () => {
                        stream.getTracks().forEach(t => t.stop());
                        const audioBlob = new Blob(audioChunksRef.current, { type: 'audio/webm' });
                        const arrayBuffer = await audioBlob.arrayBuffer();
                        const sharedSecret = await CryptoUtils.deriveSharedSecret(identity.privateKey, activeChat.publicKeyJWK);
                        const encryptedAudio = await CryptoUtils.encryptBinary(arrayBuffer, sharedSecret, 'audio');
                        await sendEncryptedPayload(encryptedAudio);
                    };
                    mediaRecorderRef.current.start(); setIsRecording(true);
                } catch (err) {}
            };
            const stopRecording = () => { if (mediaRecorderRef.current?.state === "recording") { mediaRecorderRef.current.stop(); setIsRecording(false); } };

            const initializePeerConnection = (db, fbDb, chatId, role) => {
                pcRef.current = new RTCPeerConnection(STUN_SERVERS);
                remoteStreamRef.current = new MediaStream(); 
                pendingCandidatesRef.current = []; 
                pcRef.current.ontrack = event => {
                    event.streams[0].getTracks().forEach(track => { remoteStreamRef.current.addTrack(track); });
                    if (remoteVideoRef.current && remoteVideoRef.current.srcObject !== remoteStreamRef.current) remoteVideoRef.current.srcObject = remoteStreamRef.current;
                };
                const candidatesRef = fbDb.collection(db, `chats_${chatId}_signal`, 'room', role === 'caller' ? 'callerCandidates' : 'calleeCandidates');
                pcRef.current.onicecandidate = event => { if (event.candidate) fbDb.addDoc(candidatesRef, event.candidate.toJSON()); };
            };
            
            const endCallCleanup = async () => {
                if (pcRef.current) { pcRef.current.close(); pcRef.current = null; }
                if (localStreamRef.current) { localStreamRef.current.getTracks().forEach(t => t.stop()); localStreamRef.current = null; }
                if (remoteStreamRef.current) { remoteStreamRef.current.getTracks().forEach(t => t.stop()); }
                setRtcState(null);
            };
            
            const initiateCall = async (type) => {
                setCallType(type); setRtcState('calling');
                const { db, fbDb } = fbModules;
                const chatId = [identity.code, activeChat.code].sort().join('_');
                const roomRef = fbDb.doc(db, `chats_${chatId}_signal`, 'room');
                
                await fbDb.setDoc(roomRef, { hangup: true }); 
                initializePeerConnection(db, fbDb, chatId, 'caller');
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: type === 'video' ? { facingMode: "user" } : false, audio: true });
                    localStreamRef.current = stream; if (localVideoRef.current) localVideoRef.current.srcObject = stream;
                    stream.getTracks().forEach(track => pcRef.current.addTrack(track, stream));

                    const offer = await pcRef.current.createOffer();
                    await pcRef.current.setLocalDescription(offer);
                    await fbDb.setDoc(roomRef, { offer: { type: offer.type, sdp: offer.sdp }, caller: identity.code, callType: type, hangup: false });

                    fbDb.onSnapshot(roomRef, async snapshot => {
                        const data = snapshot.data();
                        if (!pcRef.current?.currentRemoteDescription && data?.answer) {
                            await pcRef.current.setRemoteDescription(new RTCSessionDescription(data.answer));
                            setRtcState('connected');
                            pendingCandidatesRef.current.forEach(c => pcRef.current.addIceCandidate(c).catch(()=>{})); pendingCandidatesRef.current = [];
                        }
                    });
                    fbDb.onSnapshot(fbDb.collection(db, `chats_${chatId}_signal`, 'room', 'calleeCandidates'), snapshot => {
                        snapshot.docChanges().forEach(async change => { if (change.type === 'added' && pcRef.current) { const candidate = new RTCIceCandidate(change.doc.data()); if (pcRef.current.remoteDescription) await pcRef.current.addIceCandidate(candidate); else pendingCandidatesRef.current.push(candidate); } });
                    });
                } catch(e) { endCallCleanup(); }
            };
            
            const answerCall = async () => {
                setRtcState('connected'); 
                const { db, fbDb } = fbModules;
                const chatId = [identity.code, activeChat.code].sort().join('_');
                const roomRef = fbDb.doc(db, `chats_${chatId}_signal`, 'room');
                initializePeerConnection(db, fbDb, chatId, 'callee');
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: callType === 'video' ? { facingMode: "user" } : false, audio: true });
                    localStreamRef.current = stream; if (localVideoRef.current) localVideoRef.current.srcObject = stream;
                    stream.getTracks().forEach(track => pcRef.current.addTrack(track, stream));

                    const roomData = (await fbDb.getDoc(roomRef)).data();
                    await pcRef.current.setRemoteDescription(new RTCSessionDescription(roomData.offer));
                    const answer = await pcRef.current.createAnswer();
                    await pcRef.current.setLocalDescription(answer);
                    await fbDb.updateDoc(roomRef, { answer: { type: answer.type, sdp: answer.sdp } });
                    pendingCandidatesRef.current.forEach(c => pcRef.current.addIceCandidate(c).catch(()=>{})); pendingCandidatesRef.current = [];

                    fbDb.onSnapshot(fbDb.collection(db, `chats_${chatId}_signal`, 'room', 'callerCandidates'), snapshot => {
                        snapshot.docChanges().forEach(async change => { if (change.type === 'added' && pcRef.current) { const candidate = new RTCIceCandidate(change.doc.data()); if (pcRef.current.remoteDescription) await pcRef.current.addIceCandidate(candidate); else pendingCandidatesRef.current.push(candidate); } });
                    });
                } catch(e) { endCallCleanup(); }
            };
            
            const hangupCall = async () => {
                const { db, fbDb } = fbModules;
                const chatId = [identity.code, activeChat.code].sort().join('_');
                await fbDb.setDoc(fbDb.doc(db, `chats_${chatId}_signal`, 'room'), { hangup: true }, { merge: true });
                endCallCleanup();
            };

            const executeLogout = async () => { await LocalDB.wipe(); window.location.reload(); };

            if (!fbReady) return <div className="h-full w-full flex items-center justify-center absolute inset-0 bg-[var(--bg-color)]"><i className="ph animate-spin ph-spinner text-[var(--text-primary)] text-3xl"></i></div>;

            return (
                <div className="flex w-full h-full relative bg-custom-bg text-custom-main">
                    {toast && (
                        <div className="absolute top-10 left-1/2 transform -translate-x-1/2 z-[2000] toast-enter">
                            <div className="ios-glass px-5 py-2.5 rounded-full flex items-center gap-3 shadow-2xl border-custom font-semibold text-sm">
                                <i className={`${toast.icon} text-[var(--ios-blue)] text-lg`}></i> {toast.msg}
                            </div>
                        </div>
                    )}
                    
                    {dialog.show && (
                        <div className="absolute inset-0 z-[100] flex items-center justify-center p-4 bg-black/40 modal-enter">
                            <div className="ios-modal w-full max-w-[280px] rounded-3xl flex flex-col items-center text-center dialog-enter">
                                <div className="p-5 pb-4"><h3 className="font-bold text-[17px] mb-1">{dialog.title}</h3><p className="text-[13px] text-custom-muted leading-tight">{dialog.msg}</p></div>

                        </div>
                    ) : authView === "key_reveal" ? (
                        <div className="w-full h-full flex items-center justify-center p-8 bg-custom-bg relative z-10 glass-switcher-enter">
                            <div className="w-full max-w-sm text-center">
                                <h2 className="text-2xl font-bold mb-2 text-custom-main">Simpan Mnemonic Anda</h2>
                                <p className="text-custom-muted mb-6 text-sm">Klik teks di bawah untuk menyalin otomatis.</p>
                                <div className="bg-custom-surface p-6 rounded-[24px] font-mono text-[var(--ios-green)] font-bold text-lg leading-relaxed mb-8 shadow-xl border-custom active:opacity-50 transition-opacity flex flex-col gap-4 cursor-pointer" onClick={()=>{copyToClipboard(generatedRecoveryKey); showToast("Mnemonic Disalin!", "ph-copy");}}>
                                    <span className="break-words">{generatedRecoveryKey}</span>
                                    <div className="text-xs text-[var(--ios-blue)] flex items-center justify-center gap-1 bg-[var(--ios-blue)]/10 py-2 rounded-full"><i className="ph-bold ph-copy"></i> Salin ke Clipboard</div>
                                </div>
                                <button onClick={()=>setAuthView("main")} className="w-full py-4 bg-[var(--ios-blue)] rounded-[16px] font-bold text-lg text-white btn-press">Selesai Disalin</button>
                            </div>
                        </div>
                    ) : (
                        <div className="w-full h-full flex items-center justify-center p-8 bg-custom-bg relative z-10 glass-switcher-enter">
                            <button onClick={()=>setAuthView("choice")} className="absolute top-10 left-6 text-[var(--ios-blue)] flex items-center font-semibold btn-press"><i className="ph-bold ph-caret-left text-2xl -ml-1"></i> Kembali</button>
                             <div className="w-full max-w-sm text-center">
                                <h2 className="text-2xl font-bold mb-8 text-custom-main">Login Mnemonic</h2>
                                <form onSubmit={handleRestore}>
                                    <textarea required value={recoveryKeyInput} onChange={e=>setRecoveryKeyInput(e.target.value)} className="w-full bg-custom-surface py-4 px-6 rounded-[16px] text-center text-lg font-mono text-[var(--ios-green)] outline-none mb-6 border-custom" placeholder="Tempel kunci di sini" rows="4"></textarea>
                                    <button type="submit" className="w-full py-4 bg-[var(--ios-blue)] rounded-[16px] font-bold text-lg text-white btn-press">Dekripsi & Masuk</button>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Chat Area terpisah */}
                    {activeChat && authView === 'main' && (
                        <div className="absolute inset-0 z-50 flex flex-col slide-panel w-full h-full bg-custom-bg glass-switcher-enter">
                            <div className={`ios-glass px-2 pt-12 pb-2 flex items-center absolute top-0 w-full z-30 aesthetic-transition ${uiHidden ? '-translate-y-full' : 'translate-y-0'}`}>
                                <div className="w-full flex items-center">
                                    <button onClick={() => setActiveChat(null)} className="flex items-center py-2 pr-2 text-[var(--ios-blue)] btn-press"><i className="ph-bold ph-caret-left text-[28px] -ml-1"></i></button>
                                    <div className="w-9 h-9 rounded-full bg-gradient-to-tr from-blue-500 to-cyan-400 flex items-center justify-center font-bold text-xs ml-1 mr-2.5 overflow-hidden shadow-sm text-white">{activeChat?.avatarUrl ? <img src={activeChat.avatarUrl} className="w-full h-full object-cover"/> : (activeChat?.displayName?.charAt(0) || '?')}</div>
                                    <div className="flex flex-col"><span className="font-bold text-[15px] leading-tight text-custom-main">{activeChat?.displayName || 'Unknown'}</span><span className="text-[11px] text-custom-muted font-medium">E2EE Secured</span></div>
                                    <div className="ml-auto flex gap-4 pr-3">
                                        <button onClick={() => initiateCall('video')} className="text-[var(--ios-blue)] btn-press"><i className="ph-fill ph-video-camera text-[26px]"></i></button>
                                        <button onClick={() => initiateCall('audio')} className="text-[var(--ios-blue)] btn-press"><i className="ph-fill ph-phone text-[26px]"></i></button>
                                    </div>
                                </div>
                            </div>

                            <div className="scrollable-area w-full h-full px-4 py-4 flex flex-col gap-[2px] hide-scrollbar pb-[100px] pt-24" onScroll={handleMainScroll}>
                                {messages.map((msg, index, arr) => {
                                    const isMe = msg.sender === identity?.code;
                                    const isLast = !arr[index + 1] || arr[index + 1].sender !== msg.sender;
                                    const content = decryptedCache[msg.id];

                                    return (
                                        <div key={msg.id} className={`flex w-full ${isMe ? 'justify-end' : 'justify-start'} ${isLast ? 'mb-5' : ''}`}>
                                            <div className={`max-w-[78%] px-[16px] py-[8px] text-[17px] leading-[1.3] break-words overflow-hidden
                                                ${isMe ? `bg-[var(--ios-blue)] text-white bubble-enter ${isLast ? 'rounded-[20px] rounded-br-[4px] tail-right' : 'rounded-[20px]'}` : `bg-[var(--bubble-received)] text-custom-main bubble-enter-left ${isLast ? 'rounded-[20px] rounded-bl-[4px] tail-left' : 'rounded-[20px]'}`}`}>
                                                {!content ? <i className="ph animate-spin ph-spinner"></i> : content.type === 'audio' ? <audio controls src={content.url} className="h-10 w-44"></audio> : content.type === 'image' ? <img src={content.url} className="rounded-xl max-h-56" /> : content.type === 'video' ? <video controls src={content.url} className="rounded-xl max-h-56"></video> : content.text}
                                            </div>
                                        </div>
                                    );
                                })}
                                <div ref={messagesEndRef} className="h-6"></div>
                            </div>

                            <div className={`ios-glass p-2 pb-[calc(10px+env(safe-area-inset-bottom))] absolute bottom-0 w-full z-30 flex items-end gap-3 aesthetic-transition ${uiHidden ? 'translate-y-[150px]' : 'translate-y-0'}`}>
                                <input type="file" ref={fileInputRef} accept="image/*,video/*" className="hidden" onChange={handleFileUpload} />
                                <button type="button" onClick={() => fileInputRef.current.click()} className="p-2 mb-0.5 text-[var(--ios-gray)] active:text-[var(--ios-blue)] transition-colors"><i className="ph-bold ph-plus text-[26px]"></i></button>
                                <form onSubmit={handleSendText} className="flex-1 relative mb-0.5">
                                    {isRecording ? (
                                        <div className="w-full bg-[var(--ios-red)] text-white rounded-full py-[7px] text-[16px] font-bold animate-pulse text-center leading-[24px] shadow-lg">Merekam Suara...</div>
                                    ) : (
                                        <input type="text" value={inputText} onChange={(e) => setInputText(e.target.value)} placeholder="iMessage" className="w-full rounded-full py-[7px] pl-[16px] pr-[40px] text-[17px] focus:outline-none transition-colors bg-custom-surface border-custom font-medium shadow-sm" style={{ lineHeight: '24px' }} />
                                    )}
                                    {inputText.trim() ? (
                                        <button type="submit" className="absolute right-[4px] bottom-[4px] w-[30px] h-[30px] rounded-full flex items-center justify-center btn-press bg-[var(--ios-blue)] text-white"><i className="ph-bold ph-arrow-up text-[15px]"></i></button>
                                    ) : (
                                        <button type="button" onPointerDown={startRecording} onPointerUp={stopRecording} onPointerLeave={stopRecording} onTouchStart={startRecording} onTouchEnd={stopRecording} className={`absolute right-[8px] bottom-[6px] ${isRecording ? 'text-white' : 'text-custom-muted'}`}><i className={`ph-bold ph-microphone text-[24px]`}></i></button>
                                    )}
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root')); 
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
</body>
</html>
