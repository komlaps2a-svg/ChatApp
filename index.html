<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
    <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Ghost iMessage</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        /* APPLE CORE VARIABLES */
        :root {
            --ios-bg: #F2F2F7;
            --ios-surface: #FFFFFF;
            --ios-blue: #007AFF;
            --ios-gray-bg: rgba(118, 118, 128, 0.12);
            --ios-separator: rgba(60, 60, 67, 0.29);
            --ios-text: #000000;
            --ios-text-secondary: rgba(60, 60, 67, 0.6);
            --glass-bg: rgba(255, 255, 255, 0.65);
            --modal-bg: rgba(255, 255, 255, 0.85);
            --bubble-received: #E9E9EB;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --ios-bg: #000000;
                --ios-surface: #1C1C1E;
                --ios-blue: #0A84FF;
                --ios-gray-bg: rgba(118, 118, 128, 0.24);
                --ios-separator: rgba(84, 84, 88, 0.65);
                --ios-text: #FFFFFF;
                --ios-text-secondary: rgba(235, 235, 245, 0.6);
                --glass-bg: rgba(28, 28, 30, 0.65);
                --modal-bg: rgba(30, 30, 30, 0.85);
                --bubble-received: #262628;
            }
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--ios-bg);
            color: var(--ios-text);
            overscroll-behavior-y: none;
            -webkit-font-smoothing: antialiased;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .ios-glass {
            background-color: var(--glass-bg);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
            border-bottom: 0.5px solid var(--ios-separator);
        }

        .ios-modal-glass {
            background-color: var(--modal-bg);
            backdrop-filter: blur(50px) saturate(200%);
            -webkit-backdrop-filter: blur(50px) saturate(200%);
            box-shadow: 0 20px 40px rgba(0,0,0,0.15), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .btn-press { transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.1s; }
        .btn-press:active { transform: scale(0.92); opacity: 0.7; }
        .slide-panel { transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1); }

        .overlay-enter { animation: fadeIn 0.3s ease-out forwards; }
        .modal-pop { animation: applePop 0.4s cubic-bezier(0.32, 0.72, 0, 1) forwards; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes applePop {
            0% { transform: scale(0.9) translateY(20px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .bubble-enter { animation: msgSpring 0.5s cubic-bezier(0.32, 0.72, 0, 1) forwards; transform-origin: bottom right; opacity: 0; }
        .bubble-enter-left { animation: msgSpring 0.5s cubic-bezier(0.32, 0.72, 0, 1) forwards; transform-origin: bottom left; opacity: 0; }
        @keyframes msgSpring {
            0% { transform: scale(0.85) translateY(10px); opacity: 0; }
            100% { transform: scale(1) translateY(0); opacity: 1; }
        }

        .tail-right::before { content: ''; position: absolute; bottom: 0; right: -8px; width: 20px; height: 20px; background-color: var(--ios-blue); border-bottom-left-radius: 16px; z-index: -1; }
        .tail-right::after { content: ''; position: absolute; bottom: 0; right: -10px; width: 10px; height: 20px; background-color: var(--ios-bg); border-bottom-left-radius: 10px; z-index: -1; }
        .tail-left::before { content: ''; position: absolute; bottom: 0; left: -8px; width: 20px; height: 20px; background-color: var(--bubble-received); border-bottom-right-radius: 16px; z-index: -1; }
        .tail-left::after { content: ''; position: absolute; bottom: 0; left: -10px; width: 10px; height: 20px; background-color: var(--ios-bg); border-bottom-right-radius: 10px; z-index: -1; }

        input, textarea { user-select: auto; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // UTILS: CRYPTOGRAPHY (WebCrypto AES-GCM)
        // ==========================================
        const CryptoUtils = {
            async generateKeypair() { return await window.crypto.subtle.generateKey({ name: "ECDH", namedCurve: "P-256" }, true, ["deriveKey", "deriveBits"]); },
            async exportPublicKey(key) { return await window.crypto.subtle.exportKey("jwk", key); },
            async importPublicKey(jwk) { return await window.crypto.subtle.importKey("jwk", jwk, { name: "ECDH", namedCurve: "P-256" }, true, []); },
            async deriveSharedSecret(privateKey, publicKeyJWK) {
                const publicKey = await this.importPublicKey(publicKeyJWK);
                return await window.crypto.subtle.deriveKey({ name: "ECDH", public: publicKey }, privateKey, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]);
            },
            async encryptText(text, sharedKey) {
                const iv = window.crypto.getRandomValues(new Uint8Array(12));
                const encoded = new TextEncoder().encode(text);
                const ciphertext = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, sharedKey, encoded);
                return { iv: Array.from(iv), data: Array.from(new Uint8Array(ciphertext)) };
            },
            async decryptText(encryptedPayload, sharedKey) {
                try {
                    const iv = new Uint8Array(encryptedPayload.iv);
                    const data = new Uint8Array(encryptedPayload.data);
                    const decrypted = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, sharedKey, data);
                    return new TextDecoder().decode(decrypted);
                } catch (e) { return "🔒 [Decryption Error / Key Mismatch]"; }
            }
        };

        const LocalDB = {
            async init() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open("AppleGhostDB", 1);
                    req.onupgradeneeded = e => e.target.result.createObjectStore("identity", { keyPath: "id" });
                    req.onsuccess = e => resolve(e.target.result);
                    req.onerror = e => reject(e);
                });
            },
            async saveIdentity(code, privateKey, publicKeyJWK, displayName) {
                const db = await this.init();
                return new Promise((resolve) => {
                    const tx = db.transaction("identity", "readwrite");
                    tx.objectStore("identity").put({ id: "me", code, privateKey, publicKeyJWK, displayName });
                    tx.oncomplete = () => resolve();
                });
            },
            async getIdentity() {
                const db = await this.init();
                return new Promise((resolve) => {
                    if (!db.objectStoreNames.contains("identity")) return resolve(null);
                    const req = db.transaction("identity", "readonly").objectStore("identity").get("me");
                    req.onsuccess = () => resolve(req.result);
                });
            }
        };

        // ==========================================
        // HYBRID CONFIGURATION (Sandbox vs External)
        // Memastikan kode berfungsi baik di AI preview maupun di GitHub Pages lu.
        // ==========================================
        const isCanvasEnv = typeof __firebase_config !== 'undefined' && __firebase_config;
        const APP_ID = typeof __app_id !== 'undefined' ? __app_id : 'ghost-chat-e2ee-app';
        
        const getFirebaseConfig = () => {
            if (isCanvasEnv) return JSON.parse(__firebase_config);
            return {
                apiKey: "AIzaSyCftdtKP4vYY9DQSWwWkFoKXv-ceWh12WQ",
                authDomain: "ghost-chat-e2ee.firebaseapp.com",
                projectId: "ghost-chat-e2ee",
                storageBucket: "ghost-chat-e2ee.firebasestorage.app",
                messagingSenderId: "951286040813",
                appId: "1:951286040813:web:5f848f381cdcedaa6de4e4",
                measurementId: "G-R0HVVNY1L2"
            };
        };

        const App = () => {
            const [fbReady, setFbReady] = React.useState(false);
            const [fbModules, setFbModules] = React.useState(null);
            const [sysError, setSysError] = React.useState(null);
            
            const [user, setUser] = React.useState(null);
            const [identity, setIdentity] = React.useState(null);
            const [friends, setFriends] = React.useState([]);
            const [activeChat, setActiveChat] = React.useState(null);
            
            const [setupName, setSetupName] = React.useState("");
            const [searchQuery, setSearchQuery] = React.useState('');
            const [inputText, setInputText] = React.useState('');
            
            const [activeModal, setActiveModal] = React.useState(null);
            const [addCodeInput, setAddCodeInput] = React.useState("");
            const [addStatus, setAddStatus] = React.useState("");

            const [messages, setMessages] = React.useState([]);
            const [friendStatus, setFriendStatus] = React.useState(null);
            const [decryptedCache, setDecryptedCache] = React.useState({});

            const qrRef = React.useRef(null);
            const messagesEndRef = React.useRef(null);

            // [1. BOOT SEQUENCE & AUTH]
            React.useEffect(() => {
                let unsubscribeAuth = null;
                
                const initSystem = async () => {
                    try {
                        const importModule = new Function('url', 'return import(url)');
                        const fbApp = await importModule('https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js');
                        const fbAuth = await importModule('https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js');
                        const fbDb = await importModule('https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js');
                        
                        const config = getFirebaseConfig();
                        const app = !fbApp.getApps().length ? fbApp.initializeApp(config) : fbApp.getApp();
                        const auth = fbAuth.getAuth(app);
                        const db = fbDb.getFirestore(app);

                        setFbModules({ auth, db, fbAuth, fbDb });
                        
                        // Menambal bug Auth: Utamakan Custom Token di Sandbox, fallback ke Anonymous
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await fbAuth.signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await fbAuth.signInAnonymously(auth);
                        }

                        unsubscribeAuth = fbAuth.onAuthStateChanged(auth, async (u) => {
                            if (u) {
                                setUser(u);
                                const localId = await LocalDB.getIdentity();
                                if (localId) setIdentity(localId);
                                setFbReady(true);
                            } else {
                                setUser(null);
                            }
                        });
                    } catch (err) { 
                        setSysError(`Boot sequence terhenti. Gagal inisiasi Firebase: ${err.message}`);
                    }
                };
                initSystem();
                return () => { if (unsubscribeAuth) unsubscribeAuth(); };
            }, []);

            React.useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, decryptedCache, activeChat]);

            React.useEffect(() => {
                if (activeModal === 'profile' && identity && qrRef.current) {
                    qrRef.current.innerHTML = "";
                    new QRCode(qrRef.current, { text: identity.code, width: 140, height: 140, colorDark : "#000", colorLight : "#fff", correctLevel : QRCode.CorrectLevel.H });
                }
            }, [activeModal, identity]);

            // [2. PRESENCE WORKER]
            React.useEffect(() => {
                if (!fbReady || !fbModules || !user || !identity) return;
                const { db, fbDb } = fbModules;
                
                // Menggunakan strict paths untuk kompatibilitas database terisolasi
                const userDocRef = fbDb.doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', identity.code);
                
                const updatePresence = async (isOnline) => {
                    try { 
                        await fbDb.setDoc(userDocRef, { isOnline, lastSeen: Date.now() }, { merge: true }); 
                    } catch(e) {
                        console.warn("Presence update failed", e);
                    }
                };
                
                const interval = setInterval(() => updatePresence(true), 25000);
                updatePresence(true);
                
                const handleUnload = () => updatePresence(false);
                window.addEventListener("beforeunload", handleUnload);
                
                return () => { clearInterval(interval); window.removeEventListener("beforeunload", handleUnload); };
            }, [fbReady, fbModules, user, identity]);

            // [3. CHAT WORKER (REALTIME DB)]
            React.useEffect(() => {
                if (!fbReady || !fbModules || !user || !identity || !activeChat) return;
                const { db, fbDb } = fbModules;

                const friendDocRef = fbDb.doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', activeChat.code);
                
                // Menambal celah: Wajib ada error callback untuk deteksi putus koneksi/rules fail
                const unsubFriend = fbDb.onSnapshot(friendDocRef, (snap) => {
                    if (snap.exists()) setFriendStatus(snap.data());
                }, (error) => {
                    console.error("Presence sync blocked:", error);
                });

                const chatId = [identity.code, activeChat.code].sort().join('_');
                const chatColRef = fbDb.collection(db, 'artifacts', APP_ID, 'public', 'data', `chats_${chatId}`);
                
                const unsubChat = fbDb.onSnapshot(chatColRef, async (snapshot) => {
                    const msgs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    // Client-side sorting mematuhi aturan query sederhana tanpa index kompleks
                    msgs.sort((a, b) => a.timestamp - b.timestamp);
                    setMessages(msgs);

                    const sharedSecret = await CryptoUtils.deriveSharedSecret(identity.privateKey, activeChat.publicKeyJWK);
                    const newDecrypted = { ...decryptedCache };
                    let changed = false;

                    for (let msg of msgs) {
                        if (!newDecrypted[msg.id]) {
                            const cleartext = await CryptoUtils.decryptText(msg.payload, sharedSecret);
                            newDecrypted[msg.id] = cleartext;
                            changed = true;
                        }
                    }
                    if (changed) setDecryptedCache(newDecrypted);
                }, (error) => {
                    setSysError(`Koneksi Obrolan Terputus: ${error.message}`);
                });

                return () => { unsubFriend(); unsubChat(); };
            }, [fbReady, fbModules, user, identity, activeChat]);

            // [ACTIONS]
            const handleSetup = async (e) => {
                e.preventDefault();
                if (!setupName.trim() || !fbModules || !user) return;

                const code = Array.from(window.crypto.getRandomValues(new Uint8Array(4))).map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
                const keypair = await CryptoUtils.generateKeypair();
                const pubJWK = await CryptoUtils.exportPublicKey(keypair.publicKey);
                
                await LocalDB.saveIdentity(code, keypair.privateKey, pubJWK, setupName.trim());
                
                const { db, fbDb } = fbModules;
                const userDocRef = fbDb.doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', code);
                
                try {
                    await fbDb.setDoc(userDocRef, {
                        code, displayName: setupName.trim(), publicKeyJWK: pubJWK, isOnline: true, lastSeen: Date.now()
                    });
                    setIdentity({ code, privateKey: keypair.privateKey, publicKeyJWK: pubJWK, displayName: setupName.trim() });
                } catch (error) {
                    setSysError("Gagal meregistrasi identitas di server.");
                }
            };

            const processAddFriend = async (e) => {
                e.preventDefault();
                setAddStatus("Memverifikasi Kunci...");
                if (!addCodeInput.trim() || !fbModules || !user) return;
                const code = addCodeInput.trim().toUpperCase();
                
                if (code === identity.code) return setAddStatus("Batal. Ini adalah ID lokal lu.");
                if (friends.find(f => f.code === code)) return setAddStatus("Kontak sudah ada dalam matriks.");

                const { db, fbDb } = fbModules;
                const userDocRef = fbDb.doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', code);
                
                try {
                    const snap = await fbDb.getDoc(userDocRef);
                    if (snap.exists()) {
                        setFriends(prev => [...prev, snap.data()]);
                        setAddStatus("Handshake berhasil. Terenkripsi.");
                        setTimeout(() => { setActiveModal(null); setAddCodeInput(""); setAddStatus(""); }, 800);
                    } else {
                        setAddStatus("Identitas tidak ditemukan.");
                    }
                } catch (err) { 
                    setAddStatus("Jaringan terputus/ditolak."); 
                }
            };

            const handleSend = async (e) => {
                e.preventDefault();
                if (!inputText.trim() || !activeChat || !fbModules || !user) return;
                const text = inputText.trim();
                setInputText("");

                try {
                    const sharedSecret = await CryptoUtils.deriveSharedSecret(identity.privateKey, activeChat.publicKeyJWK);
                    const encryptedPayload = await CryptoUtils.encryptText(text, sharedSecret);

                    const { db, fbDb } = fbModules;
                    const chatId = [identity.code, activeChat.code].sort().join('_');
                    const chatColRef = fbDb.collection(db, 'artifacts', APP_ID, 'public', 'data', `chats_${chatId}`);
                    
                    await fbDb.addDoc(chatColRef, {
                        sender: identity.code, timestamp: Date.now(), payload: encryptedPayload, status: 'sent'
                    });
                } catch (error) {
                    console.error("Gagal mengirim pesan enkripsi", error);
                }
            };

            const formatTime = (ts) => new Date(ts).toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' });

            // [UI RENDERING]
            if (sysError) return (
                <div className="h-screen flex items-center justify-center p-6 bg-black text-white">
                    <div className="text-center w-full max-w-sm">
                        <i className="ph-fill ph-warning-circle text-5xl mb-4 text-red-500"></i>
                        <h1 className="text-xl font-bold mb-2 font-[SF Pro Display]">CRITICAL SYSTEM FAILURE</h1>
                        <div className="bg-red-900/30 border border-red-500/30 p-4 rounded-2xl text-left text-xs font-mono text-red-400 mt-4 break-words">
                            {sysError}
                        </div>
                    </div>
                </div>
            );

            if (!fbReady) return (
                <div className="h-screen flex flex-col items-center justify-center bg-[var(--ios-bg)]">
                    <i className="ph ph-spinner-gap animate-spin text-3xl mb-4 text-[var(--ios-text-secondary)]"></i>
                </div>
            );

            if (!identity) return (
                <div className="h-screen flex items-center justify-center p-4 bg-[var(--ios-bg)]">
                    <div className="w-full max-w-sm text-center">
                        <div className="w-20 h-20 mx-auto bg-blue-500/10 rounded-[22px] flex items-center justify-center mb-6">
                            <i className="ph-fill ph-shield-check text-4xl" style={{ color: 'var(--ios-blue)' }}></i>
                        </div>
                        <h1 className="text-[28px] font-bold mb-2 tracking-tight">Ghost Protocol</h1>
                        <p className="text-[15px] mb-8 leading-relaxed px-4" style={{ color: 'var(--ios-text-secondary)' }}>
                            Pesan terenkripsi End-to-End. Data tidak disimpan dalam bentuk teks terang.
                        </p>
                        <form onSubmit={handleSetup} className="space-y-4 px-2">
                            <div className="bg-[var(--ios-surface)] rounded-[14px] p-1 shadow-sm">
                                <input 
                                    type="text" required placeholder="Nama Samaran" maxLength="20"
                                    className="w-full bg-transparent text-center px-4 py-3 outline-none font-medium text-[17px]"
                                    value={setupName} onChange={e => setSetupName(e.target.value)}
                                />
                            </div>
                            <button type="submit" className="w-full text-white font-semibold py-3.5 rounded-[14px] btn-press text-[17px]" style={{ backgroundColor: 'var(--ios-blue)' }}>
                                Lanjutkan
                            </button>
                        </form>
                    </div>
                </div>
            );

            const filteredFriends = friends.filter(f => f.displayName.toLowerCase().includes(searchQuery.toLowerCase()));

            return (
                <div className="flex h-screen w-full overflow-hidden relative">
                    {/* MODAL SYSTEM */}
                    {activeModal && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center p-4 overlay-enter bg-black/40">
                            <div className="ios-modal-glass modal-pop w-full max-w-sm rounded-[32px] p-8 flex flex-col items-center text-center relative shadow-2xl">
                                <button onClick={() => setActiveModal(null)} className="absolute top-4 right-4 w-8 h-8 flex items-center justify-center bg-[var(--ios-gray-bg)] rounded-full btn-press text-[var(--ios-text-secondary)]">
                                    <i className="ph-bold ph-x text-sm"></i>
                                </button>
                                
                                {activeModal === 'profile' ? (
                                    <>
                                        <div className="w-20 h-20 rounded-full bg-gradient-to-tr from-blue-500 to-cyan-400 flex items-center justify-center text-white font-bold text-3xl mb-4 shadow-sm">
                                            {identity.displayName.charAt(0).toUpperCase()}
                                        </div>
                                        <h3 className="font-bold text-[22px] mb-1 tracking-tight">{identity.displayName}</h3>
                                        <div className="bg-[var(--ios-gray-bg)] px-5 py-2 rounded-full mb-8 flex items-center gap-2">
                                            <p className="text-[15px] font-mono tracking-[0.2em] font-bold" style={{ color: 'var(--ios-blue)' }}>{identity.code}</p>
                                        </div>
                                        <div className="bg-white p-4 rounded-[24px] shadow-sm mb-4"><div ref={qrRef}></div></div>
                                        <p className="text-[13px]" style={{ color: 'var(--ios-text-secondary)' }}>Berikan kode identitas ini untuk validasi *handshake*.</p>
                                    </>
                                ) : (
                                    <div className="w-full">
                                        <div className="w-14 h-14 mx-auto bg-blue-500/10 rounded-full flex items-center justify-center mb-4">
                                            <i className="ph-fill ph-user-plus text-2xl" style={{ color: 'var(--ios-blue)' }}></i>
                                        </div>
                                        <h3 className="font-bold text-[22px] mb-2 tracking-tight">Koneksi Baru</h3>
                                        <p className="text-[14px] mb-6" style={{ color: 'var(--ios-text-secondary)' }}>Masukkan 8 digit hash kriptografis.</p>
                                        <form onSubmit={processAddFriend}>
                                            <input 
                                                type="text" placeholder="ID Target" required maxLength="8"
                                                value={addCodeInput} onChange={e => setAddCodeInput(e.target.value)}
                                                className="w-full bg-[var(--ios-gray-bg)] border-transparent text-center font-mono text-xl tracking-widest px-4 py-3.5 rounded-[14px] outline-none mb-2 uppercase font-bold"
                                            />
                                            {addStatus && <p className={`text-[13px] text-center mb-4 font-medium ${addStatus.includes("berhasil") ? "text-green-500" : "text-red-500"}`}>{addStatus}</p>}
                                            <button type="submit" className="w-full text-white font-semibold py-3.5 rounded-[14px] btn-press text-[17px] mt-2" style={{ backgroundColor: 'var(--ios-blue)' }}>
                                                Inisiasi Handshake
                                            </button>
                                        </form>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* SIDEBAR LIST */}
                    <div className={`w-full md:w-[380px] flex-shrink-0 flex flex-col border-r border-[var(--ios-separator)] transition-transform z-10 
                        ${activeChat ? '-translate-x-full md:translate-x-0 absolute md:relative h-full' : 'translate-x-0 relative h-full'}`}>
                        
                        <div className="ios-glass px-4 pt-12 pb-3 sticky top-0 z-20">
                            <div className="flex justify-between items-center mb-4">
                                <h1 className="text-[34px] font-bold tracking-tight leading-none">Pesan</h1>
                                <div className="flex gap-1">
                                    <button onClick={() => setActiveModal('profile')} className="w-9 h-9 rounded-full flex items-center justify-center bg-[var(--ios-gray-bg)] btn-press">
                                        <i className="ph-bold ph-qr-code text-[18px]" style={{ color: 'var(--ios-blue)' }}></i>
                                    </button>
                                    <button onClick={() => setActiveModal('add')} className="w-9 h-9 rounded-full flex items-center justify-center bg-[var(--ios-gray-bg)] btn-press">
                                        <i className="ph-bold ph-pencil-simple text-[18px]" style={{ color: 'var(--ios-blue)' }}></i>
                                    </button>
                                </div>
                            </div>
                            <div className="relative">
                                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none opacity-50"><i className="ph-bold ph-magnifying-glass"></i></div>
                                <input 
                                    type="text" placeholder="Cari" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)}
                                    className="w-full bg-[var(--ios-gray-bg)] rounded-[10px] py-1.5 pl-9 pr-4 text-[17px] focus:outline-none transition-all placeholder-gray-500"
                                />
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto hide-scrollbar bg-[var(--ios-bg)]">
                            {filteredFriends.length === 0 ? (
                                <div className="p-10 text-center flex flex-col items-center mt-10" style={{ color: 'var(--ios-text-secondary)' }}>
                                    <i className="ph-fill ph-chat-teardrop text-5xl mb-3 opacity-30"></i>
                                    <p className="text-[15px]">Data kosong.</p>
                                </div>
                            ) : (
                                filteredFriends.map((friend, idx) => (
                                    <div key={friend.code} onClick={() => setActiveChat(friend)} className="cursor-pointer">
                                        <div className={`flex items-center gap-3 pl-4 transition-colors ${activeChat?.code === friend.code ? 'bg-[var(--ios-gray-bg)]' : 'active:bg-[var(--ios-gray-bg)]'}`}>
                                            <div className="w-[52px] h-[52px] rounded-full bg-gradient-to-tr from-blue-500 to-cyan-400 flex items-center justify-center text-white font-bold text-xl flex-shrink-0">
                                                {friend.displayName.charAt(0).toUpperCase()}
                                            </div>
                                            <div className={`flex-1 min-w-0 py-3 pr-4 ${idx !== filteredFriends.length - 1 && activeChat?.code !== friend.code ? 'border-b border-[var(--ios-separator)]' : ''}`}>
                                                <div className="flex justify-between items-baseline mb-0.5">
                                                    <h3 className="font-semibold text-[17px] truncate">{friend.displayName}</h3>
                                                </div>
                                                <p className="text-[15px] truncate" style={{ color: 'var(--ios-text-secondary)' }}>
                                                    E2EE Terkunci • {friend.code}
                                                </p>
                                            </div>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>

                    {/* CHAT AREA */}
                    <div className={`flex-1 flex flex-col bg-[var(--ios-bg)] slide-panel absolute md:relative w-full h-full z-20 
                        ${activeChat ? 'translate-x-0' : 'translate-x-full md:translate-x-0'}`}>
                        
                        {activeChat ? (
                            <React.Fragment>
                                <div className="ios-glass px-2 pt-[3.2rem] pb-2 flex items-center justify-between sticky top-0 z-30">
                                    <div className="flex items-center">
                                        <button onClick={() => setActiveChat(null)} className="md:hidden flex items-center py-2 pr-2 btn-press" style={{ color: 'var(--ios-blue)' }}>
                                            <i className="ph-bold ph-caret-left text-[28px] -ml-1"></i>
                                            <span className="text-[17px] -ml-1">Pesan</span>
                                        </button>
                                        <div className="flex items-center gap-2 ml-1 md:ml-4">
                                            <div className="w-8 h-8 rounded-full bg-gradient-to-tr from-blue-500 to-cyan-400 flex items-center justify-center text-white font-bold text-xs">
                                                {activeChat.displayName.charAt(0).toUpperCase()}
                                            </div>
                                            <div className="flex flex-col">
                                                <span className="font-semibold text-[13px] leading-tight">{activeChat.displayName}</span>
                                                <span className="text-[11px] leading-tight" style={{ color: 'var(--ios-text-secondary)' }}>
                                                    {friendStatus?.isOnline ? 'Online' : friendStatus?.lastSeen ? formatTime(friendStatus.lastSeen) : 'Offline'}
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="p-2" style={{ color: 'var(--ios-blue)' }}><i className="ph-fill ph-video-camera text-2xl opacity-50"></i></div>
                                </div>

                                <div className="flex-1 overflow-y-auto px-4 py-4 flex flex-col gap-[2px] hide-scrollbar relative">
                                    <div className="text-center my-6">
                                        <span className="text-[11px] font-bold uppercase tracking-widest" style={{ color: 'var(--ios-text-secondary)' }}>E2EE Session Active</span>
                                    </div>

                                    {messages.map((msg, index, arr) => {
                                        const isMe = msg.sender === identity.code;
                                        const nextMsg = arr[index + 1];
                                        const isLastInGroup = index === arr.length - 1 || (nextMsg && nextMsg.sender !== msg.sender);
                                        const text = decryptedCache[msg.id] || "Mendekripsi...";

                                        return (
                                            <div key={msg.id} className={`flex w-full ${isMe ? 'justify-end' : 'justify-start'} ${isLastInGroup ? 'mb-4' : ''}`}>
                                                <div className={`relative max-w-[75%] px-[16px] py-[8px] text-[17px] leading-[1.3]
                                                        ${isMe 
                                                            ? `text-white bubble-enter ${isLastInGroup ? 'rounded-[18px] rounded-br-[4px] tail-right' : 'rounded-[18px]'}` 
                                                            : `bubble-enter-left ${isLastInGroup ? 'rounded-[18px] rounded-bl-[4px] tail-left' : 'rounded-[18px]'}`
                                                        }`}
                                                     style={{ 
                                                         backgroundColor: isMe ? 'var(--ios-blue)' : 'var(--bubble-received)',
                                                         color: isMe ? '#fff' : 'var(--ios-text)'
                                                     }}
                                                >
                                                    <p style={{ wordBreak: 'break-word' }}>{text}</p>
                                                </div>
                                            </div>
                                        );
                                    })}
                                    <div ref={messagesEndRef} className="h-4"></div>
                                </div>

                                <div className="ios-glass p-2 pb-8 md:pb-4 z-30 flex items-end gap-3">
                                    <button type="button" className="p-2 mb-0.5 btn-press text-[var(--ios-text-secondary)]"><i className="ph-bold ph-plus text-[24px]"></i></button>
                                    <form onSubmit={handleSend} className="flex-1 relative mb-0.5">
                                        <input 
                                            type="text" value={inputText} onChange={(e) => setInputText(e.target.value)}
                                            placeholder="iMessage" 
                                            className="w-full rounded-full py-[6px] pl-[16px] pr-[36px] text-[17px] focus:outline-none transition-colors border border-[var(--ios-separator)]"
                                            style={{ backgroundColor: 'var(--ios-surface)', lineHeight: '24px' }}
                                        />
                                        {inputText.trim() ? (
                                            <button type="submit" className="absolute right-[4px] bottom-[4px] w-[28px] h-[28px] rounded-full flex items-center justify-center btn-press" style={{ backgroundColor: 'var(--ios-blue)', color: 'white' }}>
                                                <i className="ph-bold ph-arrow-up text-[14px]"></i>
                                            </button>
                                        ) : (
                                            <button type="button" className="absolute right-[8px] bottom-[6px] text-[var(--ios-text-secondary)]"><i className="ph-bold ph-microphone text-[22px]"></i></button>
                                        )}
                                    </form>
                                </div>
                            </React.Fragment>
                        ) : (
                            <div className="hidden md:flex flex-1 items-center justify-center flex-col opacity-20">
                                <i className="ph-fill ph-chat-circle text-7xl mb-4"></i>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
