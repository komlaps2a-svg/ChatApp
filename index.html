<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Ghost Protocol</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        :root {
            --bg-dark: #000000;
            --surface: #1C1C1E;
            --primary: #0A84FF;
            --text-main: #FFFFFF;
            --text-muted: rgba(235, 235, 245, 0.6);
            --border: rgba(84, 84, 88, 0.65);
            --danger: #FF453A;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            overscroll-behavior-y: none;
            -webkit-font-smoothing: antialiased;
            user-select: none;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .glass-panel {
            background-color: rgba(28, 28, 30, 0.7);
            backdrop-filter: blur(40px) saturate(200%);
            -webkit-backdrop-filter: blur(40px) saturate(200%);
        }

        .btn-press { transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.1s; }
        .btn-press:active { transform: scale(0.95); opacity: 0.8; }
        .btn-disabled { opacity: 0.5; cursor: not-allowed; }

        input, textarea { user-select: auto; }
        .selectable-text { user-select: all; -webkit-user-select: all; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // ==========================================
        // [UTILS] CRYPTO ENGINE (WebCrypto API)
        // DILARANG MENGGUNAKAN LIBRARY EKSTERNAL UNTUK E2EE.
        // ==========================================
        const CryptoUtils = {
            async generateKeypair() { 
                return await window.crypto.subtle.generateKey({ name: "ECDH", namedCurve: "P-256" }, true, ["deriveKey", "deriveBits"]); 
            },
            async exportKeyJWK(key) { 
                return await window.crypto.subtle.exportKey("jwk", key); 
            },
            async importPublicKey(jwk) { 
                return await window.crypto.subtle.importKey("jwk", jwk, { name: "ECDH", namedCurve: "P-256" }, true, []); 
            },
            async importPrivateKey(jwk) { 
                return await window.crypto.subtle.importKey("jwk", jwk, { name: "ECDH", namedCurve: "P-256" }, true, ["deriveKey", "deriveBits"]); 
            },
            async deriveSharedSecret(privateKey, publicKeyJWK) {
                const publicKey = await this.importPublicKey(publicKeyJWK);
                return await window.crypto.subtle.deriveKey({ name: "ECDH", public: publicKey }, privateKey, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]);
            },
            async encryptText(text, sharedKey) {
                const iv = window.crypto.getRandomValues(new Uint8Array(12));
                const encoded = new TextEncoder().encode(text);
                const ciphertext = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, sharedKey, encoded);
                return { iv: Array.from(iv), data: Array.from(new Uint8Array(ciphertext)) };
            },
            async decryptText(encryptedPayload, sharedKey) {
                try {
                    const iv = new Uint8Array(encryptedPayload.iv);
                    const data = new Uint8Array(encryptedPayload.data);
                    const decrypted = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, sharedKey, data);
                    return new TextDecoder().decode(decrypted);
                } catch (e) { return "🔒 [Decryption Failed: Key Mismatch]"; }
            }
        };

        // ==========================================
        // [UTILS] STORAGE LAYER
        // ==========================================
        const LocalDB = {
            async init() {
                return new Promise((resolve, reject) => {
                    const req = indexedDB.open("GhostProtocolDB", 2);
                    req.onupgradeneeded = e => {
                        if(e.oldVersion < 2) {
                            try { e.target.result.deleteObjectStore("identity"); } catch(err){}
                            e.target.result.createObjectStore("identity", { keyPath: "id" });
                        }
                    };
                    req.onsuccess = e => resolve(e.target.result);
                    req.onerror = e => reject(e);
                });
            },
            async saveIdentity(code, privateKeyJWK, publicKeyJWK, displayName) {
                const db = await this.init();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction("identity", "readwrite");
                    tx.objectStore("identity").put({ id: "active", code, privateKeyJWK, publicKeyJWK, displayName });
                    tx.oncomplete = () => resolve();
                    tx.onerror = () => reject(tx.error);
                });
            },
            async getIdentity() {
                const db = await this.init();
                return new Promise((resolve) => {
                    if (!db.objectStoreNames.contains("identity")) return resolve(null);
                    const req = db.transaction("identity", "readonly").objectStore("identity").get("active");
                    req.onsuccess = () => resolve(req.result);
                    req.onerror = () => resolve(null);
                });
            },
            async wipeData() {
                const db = await this.init();
                return new Promise((resolve) => {
                    const tx = db.transaction("identity", "readwrite");
                    tx.objectStore("identity").clear();
                    tx.oncomplete = () => resolve();
                });
            }
        };

        // ==========================================
        // [CONFIG] HYBRID FIREBASE
        // ==========================================
        const isCanvasEnv = typeof __firebase_config !== 'undefined' && __firebase_config;
        const APP_ID = typeof __app_id !== 'undefined' ? __app_id : 'ghost-chat-e2ee';
        
        const getFirebaseConfig = () => {
            if (isCanvasEnv) return JSON.parse(__firebase_config);
            return {
                apiKey: "AIzaSyCftdtKP4vYY9DQSWwWkFoKXv-ceWh12WQ",
                authDomain: "ghost-chat-e2ee.firebaseapp.com",
                projectId: "ghost-chat-e2ee",
                storageBucket: "ghost-chat-e2ee.firebasestorage.app",
                messagingSenderId: "951286040813",
                appId: "1:951286040813:web:5f848f381cdcedaa6de4e4"
            };
        };

        // ==========================================
        // [MAIN] REACT APPLICATION
        // ==========================================
        const App = () => {
            // System State
            const [fbReady, setFbReady] = React.useState(false);
            const [fbModules, setFbModules] = React.useState(null);
            const [user, setUser] = React.useState(null);
            
            // UI State
            const [sysError, setSysError] = React.useState(null);
            const [loadingState, setLoadingState] = React.useState("");
            const [authView, setAuthView] = React.useState("choice"); // choice | register | login | key_reveal | main
            
            // App State
            const [identity, setIdentity] = React.useState(null); // { code, privateKey (CryptoKey), pubJWK, name }
            const [friends, setFriends] = React.useState([]);
            const [activeChat, setActiveChat] = React.useState(null);
            const [messages, setMessages] = React.useState([]);
            const [decryptedCache, setDecryptedCache] = React.useState({});

            // Inputs
            const [setupName, setSetupName] = React.useState("");
            const [recoveryKeyInput, setRecoveryKeyInput] = React.useState("");
            const [generatedRecoveryKey, setGeneratedRecoveryKey] = React.useState("");
            const [inputText, setInputText] = React.useState('');
            
            // Modals
            const [activeModal, setActiveModal] = React.useState(null); // profile | add | null
            const [addCodeInput, setAddCodeInput] = React.useState("");
            const [addStatus, setAddStatus] = React.useState("");

            const messagesEndRef = React.useRef(null);
            const qrRef = React.useRef(null);

            // ------------------------------------------
            // 1. BOOT & AUTHENTICATION
            // ------------------------------------------
            React.useEffect(() => {
                let unsubscribeAuth = null;
                const initSystem = async () => {
                    try {
                        setLoadingState("Connecting to Backend...");
                        const importModule = new Function('url', 'return import(url)');
                        const fbApp = await importModule('https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js');
                        const fbAuth = await importModule('https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js');
                        const fbDb = await importModule('https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js');
                        
                        const config = getFirebaseConfig();
                        const app = !fbApp.getApps().length ? fbApp.initializeApp(config) : fbApp.getApp();
                        const auth = fbAuth.getAuth(app);
                        const db = fbDb.getFirestore(app);

                        setFbModules({ auth, db, fbAuth, fbDb });
                        
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await fbAuth.signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await fbAuth.signInAnonymously(auth);
                        }

                        unsubscribeAuth = fbAuth.onAuthStateChanged(auth, async (u) => {
                            if (u) {
                                setUser(u);
                                setLoadingState("Checking Local Identity...");
                                const localData = await LocalDB.getIdentity();
                                if (localData) {
                                    // Re-hydrate CryptoKey from JWK
                                    try {
                                        const privKey = await CryptoUtils.importPrivateKey(localData.privateKeyJWK);
                                        setIdentity({
                                            code: localData.code,
                                            privateKey: privKey,
                                            publicKeyJWK: localData.publicKeyJWK,
                                            displayName: localData.displayName
                                        });
                                        setAuthView("main");
                                    } catch (e) {
                                        setSysError("Kunci lokal korup. Harap re-login menggunakan Recovery Key.");
                                        await LocalDB.wipeData();
                                    }
                                }
                                setFbReady(true);
                                setLoadingState("");
                            } else {
                                setUser(null);
                            }
                        });
                    } catch (err) { 
                        setSysError(`BOOT_FAILED: ${err.message}`);
                    }
                };
                initSystem();
                return () => { if (unsubscribeAuth) unsubscribeAuth(); };
            }, []);

            // Auto-scroll
            React.useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, decryptedCache]);

            // Realtime Chat Worker
            React.useEffect(() => {
                if (!fbReady || !identity || !activeChat || authView !== "main") return;
                const { db, fbDb } = fbModules;

                const chatId = [identity.code, activeChat.code].sort().join('_');
                const chatPath = isCanvasEnv 
                    ? fbDb.collection(db, 'artifacts', APP_ID, 'public', 'data', `chats_${chatId}`)
                    : fbDb.collection(db, `chats_${chatId}`);
                
                const unsubChat = fbDb.onSnapshot(chatPath, async (snapshot) => {
                    const msgs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    msgs.sort((a, b) => a.timestamp - b.timestamp);
                    setMessages(msgs);

                    const sharedSecret = await CryptoUtils.deriveSharedSecret(identity.privateKey, activeChat.publicKeyJWK);
                    const newDecrypted = { ...decryptedCache };
                    let changed = false;

                    for (let msg of msgs) {
                        if (!newDecrypted[msg.id]) {
                            newDecrypted[msg.id] = await CryptoUtils.decryptText(msg.payload, sharedSecret);
                            changed = true;
                        }
                    }
                    if (changed) setDecryptedCache(newDecrypted);
                }, (error) => setSysError(`SYNC_ERROR: ${error.message}`));

                return () => unsubChat();
            }, [fbReady, identity, activeChat, authView]);

            // ------------------------------------------
            // 2. CORE LOGIC: REGISTRATION (New Account)
            // ------------------------------------------
            const handleRegister = async (e) => {
                e.preventDefault();
                if (!setupName.trim() || !fbModules || !user) return;
                setLoadingState("Generating Keys...");

                try {
                    // 1. Generate Public ID & Keys
                    const code = Array.from(window.crypto.getRandomValues(new Uint8Array(4))).map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
                    const keypair = await CryptoUtils.generateKeypair();
                    
                    const pubJWK = await CryptoUtils.exportKeyJWK(keypair.publicKey);
                    const privJWK = await CryptoUtils.exportKeyJWK(keypair.privateKey);
                    
                    // 2. Build Recovery Key (Export Format)
                    const recoveryObj = { c: code, p: privJWK, pu: pubJWK, n: setupName.trim() };
                    const rKey = "GHOST-" + btoa(JSON.stringify(recoveryObj));
                    setGeneratedRecoveryKey(rKey);

                    // 3. Save to LocalDB
                    await LocalDB.saveIdentity(code, privJWK, pubJWK, setupName.trim());
                    
                    // 4. Save to Firestore (Public Directory)
                    const { db, fbDb } = fbModules;
                    const userDocRef = isCanvasEnv 
                        ? fbDb.doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', code)
                        : fbDb.doc(db, 'users', code);
                    
                    await fbDb.setDoc(userDocRef, {
                        code, displayName: setupName.trim(), publicKeyJWK: pubJWK, createdAt: Date.now()
                    });

                    // 5. Update State
                    setIdentity({ code, privateKey: keypair.privateKey, publicKeyJWK: pubJWK, displayName: setupName.trim() });
                    setAuthView("key_reveal");
                } catch (err) {
                    setSysError(`REGISTRATION_FAILED: ${err.message}`);
                } finally {
                    setLoadingState("");
                }
            };

            // ------------------------------------------
            // 3. CORE LOGIC: LOGIN (Restore Account)
            // ------------------------------------------
            const handleRestore = async (e) => {
                e.preventDefault();
                if (!recoveryKeyInput.trim() || !fbModules || !user) return;
                setLoadingState("Decrypting Local Key...");

                try {
                    // 1. Parse Key
                    const base64str = recoveryKeyInput.replace("GHOST-", "");
                    const parsed = JSON.parse(atob(base64str));
                    
                    if (!parsed.c || !parsed.p || !parsed.pu) throw new Error("Format Key tidak valid.");

                    // 2. Re-hydrate Private Key
                    const privKey = await CryptoUtils.importPrivateKey(parsed.p);

                    // 3. Save to Local DB
                    await LocalDB.saveIdentity(parsed.c, parsed.p, parsed.pu, parsed.n);

                    // 4. Enter Main App
                    setIdentity({ code: parsed.c, privateKey: privKey, publicKeyJWK: parsed.pu, displayName: parsed.n });
                    setAuthView("main");
                } catch (err) {
                    alert("Kunci Recovery tidak valid atau rusak.");
                } finally {
                    setLoadingState("");
                }
            };

            // ------------------------------------------
            // 4. CORE LOGIC: LOGOUT
            // ------------------------------------------
            const handleLogout = async () => {
                if(!confirm("PERINGATAN: Logout akan menghapus kredensial kriptografi dari perangkat ini. Pastikan Anda telah menyimpan Private Recovery Key. Lanjutkan?")) return;
                await LocalDB.wipeData();
                setIdentity(null);
                setActiveChat(null);
                setAuthView("choice");
                setActiveModal(null);
            };

            // ------------------------------------------
            // 5. CORE LOGIC: MESSAGING & FRIENDS
            // ------------------------------------------
            const processAddFriend = async (e) => {
                e.preventDefault();
                setAddStatus("Verifying ID...");
                const code = addCodeInput.trim().toUpperCase();
                
                if (code === identity.code) return setAddStatus("ERR: Cannot add self.");
                if (friends.find(f => f.code === code)) return setAddStatus("ERR: Contact exists.");

                const { db, fbDb } = fbModules;
                const userDocRef = isCanvasEnv 
                    ? fbDb.doc(db, 'artifacts', APP_ID, 'public', 'data', 'users', code)
                    : fbDb.doc(db, 'users', code);
                
                try {
                    const snap = await fbDb.getDoc(userDocRef);
                    if (snap.exists()) {
                        setFriends(prev => [...prev, snap.data()]);
                        setAddStatus("SUCCESS");
                        setTimeout(() => { setActiveModal(null); setAddCodeInput(""); setAddStatus(""); }, 500);
                    } else {
                        setAddStatus("ERR: ID not found.");
                    }
                } catch (err) { setAddStatus("ERR: Network blocked."); }
            };

            const handleSend = async (e) => {
                e.preventDefault();
                if (!inputText.trim() || !activeChat || !fbModules) return;
                const text = inputText.trim();
                setInputText("");

                try {
                    const sharedSecret = await CryptoUtils.deriveSharedSecret(identity.privateKey, activeChat.publicKeyJWK);
                    const encryptedPayload = await CryptoUtils.encryptText(text, sharedSecret);

                    const { db, fbDb } = fbModules;
                    const chatId = [identity.code, activeChat.code].sort().join('_');
                    const chatPath = isCanvasEnv 
                        ? fbDb.collection(db, 'artifacts', APP_ID, 'public', 'data', `chats_${chatId}`)
                        : fbDb.collection(db, `chats_${chatId}`);
                    
                    await fbDb.addDoc(chatPath, {
                        sender: identity.code, timestamp: Date.now(), payload: encryptedPayload, status: 'sent'
                    });
                } catch (error) { console.error(error); alert("Gagal enkripsi pesan."); }
            };


            // ==========================================
            // [VIEW] ERROR FALLBACK
            // ==========================================
            if (sysError) return (
                <div className="h-screen flex items-center justify-center p-6 bg-black text-white">
                    <div className="text-center w-full max-w-sm">
                        <i className="ph-fill ph-warning-circle text-5xl mb-4 text-[var(--danger)]"></i>
                        <h1 className="text-xl font-bold mb-2">CRITICAL EXCEPTION</h1>
                        <div className="bg-red-900/30 border border-red-500/30 p-4 rounded-xl text-left text-xs font-mono text-red-400 mt-4 break-words">
                            {sysError}
                        </div>
                        <button onClick={() => window.location.reload()} className="mt-6 w-full py-3 bg-[var(--surface)] rounded-xl font-bold">Hard Reboot</button>
                    </div>
                </div>
            );

            if (!fbReady || loadingState) return (
                <div className="h-screen flex flex-col items-center justify-center bg-[var(--bg-dark)]">
                    <i className="ph ph-spinner-gap animate-spin text-3xl mb-4 text-[var(--primary)]"></i>
                    <p className="text-[var(--text-muted)] text-sm font-mono">{loadingState || "Booting System..."}</p>
                </div>
            );

            // ==========================================
            // [VIEW] AUTH ROUTER (Choice -> Register/Login -> Reveal)
            // ==========================================
            if (authView === "choice") return (
                <div className="h-screen flex items-center justify-center p-6 bg-[var(--bg-dark)]">
                    <div className="w-full max-w-sm text-center">
                        <div className="w-20 h-20 mx-auto bg-blue-500/10 rounded-2xl flex items-center justify-center mb-6">
                            <i className="ph-fill ph-shield-check text-4xl text-[var(--primary)]"></i>
                        </div>
                        <h1 className="text-3xl font-bold mb-2 tracking-tight text-white">Ghost Protocol</h1>
                        <p className="text-sm mb-10 text-[var(--text-muted)]">Otentikasi Kriptografis Tanpa Nomor Telepon.</p>
                        
                        <div className="space-y-4">
                            <button onClick={() => setAuthView("register")} className="w-full py-3.5 rounded-xl font-bold bg-[var(--primary)] text-white btn-press">
                                Buat Identitas Baru
                            </button>
                            <button onClick={() => setAuthView("login")} className="w-full py-3.5 rounded-xl font-bold bg-[var(--surface)] text-white btn-press">
                                Login via Recovery Key
                            </button>
                        </div>
                    </div>
                </div>
            );

            if (authView === "register") return (
                <div className="h-screen flex items-center justify-center p-6 bg-[var(--bg-dark)] relative">
                    <button onClick={() => setAuthView("choice")} className="absolute top-6 left-6 text-[var(--primary)] flex items-center">
                        <i className="ph-bold ph-caret-left text-2xl"></i> Batal
                    </button>
                    <div className="w-full max-w-sm">
                        <h2 className="text-2xl font-bold mb-2">Identitas Publik</h2>
                        <p className="text-sm mb-6 text-[var(--text-muted)]">Nama ini akan terlihat oleh kontak Anda.</p>
                        <form onSubmit={handleRegister}>
                            <input 
                                type="text" required placeholder="Nama Samaran" maxLength="20"
                                className="w-full bg-[var(--surface)] text-white px-4 py-4 rounded-xl outline-none mb-4 font-bold text-center"
                                value={setupName} onChange={e => setSetupName(e.target.value)}
                            />
                            <button type="submit" disabled={!setupName.trim()} className={`w-full py-3.5 rounded-xl font-bold bg-[var(--primary)] text-white btn-press ${!setupName.trim() ? 'btn-disabled' : ''}`}>
                                Generate RSA Keys
                            </button>
                        </form>
                    </div>
                </div>
            );

            if (authView === "login") return (
                <div className="h-screen flex items-center justify-center p-6 bg-[var(--bg-dark)] relative">
                    <button onClick={() => setAuthView("choice")} className="absolute top-6 left-6 text-[var(--primary)] flex items-center">
                        <i className="ph-bold ph-caret-left text-2xl"></i> Batal
                    </button>
                    <div className="w-full max-w-sm">
                        <h2 className="text-2xl font-bold mb-2">Restore Session</h2>
                        <p className="text-sm mb-6 text-[var(--text-muted)]">Masukkan Private Recovery Key Anda yang diawali dengan "GHOST-".</p>
                        <form onSubmit={handleRestore}>
                            <textarea 
                                required placeholder="GHOST-xxxxxx..." rows="4"
                                className="w-full bg-[var(--surface)] text-[12px] font-mono text-green-400 px-4 py-3 rounded-xl outline-none mb-4 resize-none break-all"
                                value={recoveryKeyInput} onChange={e => setRecoveryKeyInput(e.target.value)}
                            />
                            <button type="submit" disabled={!recoveryKeyInput.trim()} className={`w-full py-3.5 rounded-xl font-bold bg-[var(--primary)] text-white btn-press ${!recoveryKeyInput.trim() ? 'btn-disabled' : ''}`}>
                                Dekripsi & Masuk
                            </button>
                        </form>
                    </div>
                </div>
            );

            if (authView === "key_reveal") return (
                <div className="h-screen flex items-center justify-center p-6 bg-[var(--bg-dark)]">
                    <div className="w-full max-w-sm text-center">
                        <i className="ph-fill ph-warning text-4xl text-yellow-500 mb-4"></i>
                        <h2 className="text-xl font-bold mb-2">Simpan Recovery Key</h2>
                        <p className="text-xs mb-4 text-[var(--text-muted)]">Jika Anda logout atau pindah perangkat, ini adalah <b>SATU-SATUNYA CARA</b> untuk memulihkan akun dan membaca pesan Anda. Kami tidak menyimpannya di server.</p>
                        
                        <div className="bg-[var(--surface)] p-4 rounded-xl mb-6 text-left relative">
                            <div className="text-[10px] font-mono text-green-400 break-all selectable-text max-h-[150px] overflow-y-auto">
                                {generatedRecoveryKey}
                            </div>
                        </div>

                        <button onClick={() => {
                            navigator.clipboard.writeText(generatedRecoveryKey).catch(() => {});
                            setAuthView("main");
                        }} className="w-full py-3.5 rounded-xl font-bold bg-[var(--primary)] text-white btn-press">
                            Saya Sudah Menyalinnya
                        </button>
                    </div>
                </div>
            );


            // ==========================================
            // [VIEW] MAIN APPLICATION
            // ==========================================
            return (
                <div className="flex h-screen w-full overflow-hidden relative">
                    
                    {/* MODAL SYSTEM */}
                    {activeModal && (
                        <div className="absolute inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
                            <div className="bg-[var(--surface)] w-full max-w-sm rounded-[28px] p-6 flex flex-col items-center text-center relative border border-[var(--border)]">
                                <button onClick={() => setActiveModal(null)} className="absolute top-4 right-4 w-8 h-8 flex items-center justify-center bg-white/10 rounded-full btn-press">
                                    <i className="ph-bold ph-x text-sm"></i>
                                </button>
                                
                                {activeModal === 'profile' ? (
                                    <>
                                        <div className="w-16 h-16 rounded-full bg-gradient-to-tr from-blue-500 to-cyan-400 flex items-center justify-center text-white font-bold text-2xl mb-4">
                                            {identity.displayName.charAt(0).toUpperCase()}
                                        </div>
                                        <h3 className="font-bold text-xl mb-1">{identity.displayName}</h3>
                                        <div className="bg-black/50 px-4 py-2 rounded-lg mb-6 border border-white/10">
                                            <p className="text-xs text-[var(--text-muted)] mb-1">Public ID (Share this to chat)</p>
                                            <p className="text-lg font-mono tracking-widest text-[var(--primary)] font-bold">{identity.code}</p>
                                        </div>
                                        
                                        <div className="w-full space-y-2 mt-4">
                                            <button onClick={() => alert("Fitur backup sedang dibangun. Catat string GHOST- yang diberikan saat registrasi.")} className="w-full py-3 rounded-xl bg-white/5 font-semibold text-sm btn-press">
                                                Backup Recovery Key
                                            </button>
                                            <button onClick={handleLogout} className="w-full py-3 rounded-xl bg-red-500/10 text-[var(--danger)] font-bold text-sm btn-press border border-red-500/20">
                                                Log Out / Hapus Data
                                            </button>
                                        </div>
                                    </>
                                ) : (
                                    <div className="w-full">
                                        <h3 className="font-bold text-xl mb-2 mt-2">New Connection</h3>
                                        <p className="text-sm mb-6 text-[var(--text-muted)]">Input 8-digit Public ID</p>
                                        <form onSubmit={processAddFriend}>
                                            <input 
                                                type="text" required maxLength="8"
                                                value={addCodeInput} onChange={e => setAddCodeInput(e.target.value)}
                                                className="w-full bg-black/50 border border-white/10 text-center font-mono text-xl tracking-widest px-4 py-3 rounded-xl outline-none mb-4 uppercase text-white"
                                            />
                                            {addStatus && <p className={`text-xs text-center mb-4 ${addStatus.includes("SUCCESS") ? "text-green-500" : "text-[var(--danger)]"}`}>{addStatus}</p>}
                                            <button type="submit" className="w-full font-bold py-3.5 rounded-xl btn-press text-[var(--bg-dark)] bg-white">
                                                Initiate Handshake
                                            </button>
                                        </form>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* SIDEBAR */}
                    <div className={`w-full md:w-[320px] lg:w-[380px] flex-shrink-0 flex flex-col border-r border-[var(--border)] transition-transform z-10 
                        ${activeChat ? '-translate-x-full md:translate-x-0 absolute md:relative h-full' : 'translate-x-0 relative h-full'}`}>
                        
                        <div className="glass-panel px-4 pt-10 pb-3 sticky top-0 z-20">
                            <div className="flex justify-between items-center mb-4">
                                <h1 className="text-3xl font-bold tracking-tight">Chats</h1>
                                <div className="flex gap-2">
                                    <button onClick={() => setActiveModal('profile')} className="w-9 h-9 rounded-full flex items-center justify-center bg-[var(--surface)] btn-press border border-white/10">
                                        <i className="ph-fill ph-gear text-[18px] text-[var(--primary)]"></i>
                                    </button>
                                    <button onClick={() => setActiveModal('add')} className="w-9 h-9 rounded-full flex items-center justify-center bg-[var(--surface)] btn-press border border-white/10">
                                        <i className="ph-bold ph-plus text-[18px] text-[var(--primary)]"></i>
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto hide-scrollbar p-2">
                            {friends.length === 0 ? (
                                <div className="text-center mt-10 text-[var(--text-muted)]">
                                    <p className="text-sm">No encrypted sessions.</p>
                                </div>
                            ) : (
                                friends.map((friend) => (
                                    <div key={friend.code} onClick={() => setActiveChat(friend)} 
                                        className={`cursor-pointer p-3 rounded-xl mb-1 flex items-center gap-3 transition-colors ${activeChat?.code === friend.code ? 'bg-[var(--primary)] text-white' : 'hover:bg-white/5'}`}>
                                        <div className="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center font-bold text-lg flex-shrink-0">
                                            {friend.displayName.charAt(0).toUpperCase()}
                                        </div>
                                        <div className="flex-1 min-w-0">
                                            <h3 className="font-semibold text-base truncate">{friend.displayName}</h3>
                                            <p className={`text-xs truncate ${activeChat?.code === friend.code ? 'text-blue-100' : 'text-[var(--text-muted)]'}`}>
                                                Public ID: {friend.code}
                                            </p>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>

                    {/* CHAT AREA */}
                    <div className={`flex-1 flex flex-col slide-panel absolute md:relative w-full h-full z-20 bg-black
                        ${activeChat ? 'translate-x-0' : 'translate-x-full md:translate-x-0'}`}>
                        
                        {activeChat ? (
                            <React.Fragment>
                                <div className="glass-panel px-3 pt-10 pb-3 flex items-center sticky top-0 z-30 border-b border-[var(--border)]">
                                    <button onClick={() => setActiveChat(null)} className="md:hidden flex items-center mr-2 btn-press text-[var(--primary)]">
                                        <i className="ph-bold ph-caret-left text-3xl -ml-2"></i>
                                    </button>
                                    <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-cyan-400 flex items-center justify-center font-bold mr-3">
                                        {activeChat.displayName.charAt(0).toUpperCase()}
                                    </div>
                                    <div className="flex flex-col">
                                        <span className="font-bold text-base">{activeChat.displayName}</span>
                                        <span className="text-xs text-[var(--text-muted)]">E2EE Secured</span>
                                    </div>
                                </div>

                                <div className="flex-1 overflow-y-auto px-4 py-4 flex flex-col gap-1 hide-scrollbar">
                                    {messages.map((msg, index, arr) => {
                                        const isMe = msg.sender === identity.code;
                                        const nextMsg = arr[index + 1];
                                        const isLast = !nextMsg || nextMsg.sender !== msg.sender;
                                        const text = decryptedCache[msg.id] || "Decrypting...";

                                        return (
                                            <div key={msg.id} className={`flex w-full ${isMe ? 'justify-end' : 'justify-start'} ${isLast ? 'mb-3' : ''}`}>
                                                <div className={`max-w-[75%] px-4 py-2 text-[15px] leading-relaxed break-words
                                                        ${isMe ? 'bg-[var(--primary)] text-white rounded-[20px] rounded-br-sm' 
                                                               : 'bg-[var(--surface)] border border-[var(--border)] text-white rounded-[20px] rounded-bl-sm'}`}>
                                                    {text}
                                                </div>
                                            </div>
                                        );
                                    })}
                                    <div ref={messagesEndRef} className="h-4"></div>
                                </div>

                                <div className="glass-panel p-3 pb-8 md:pb-4 z-30">
                                    <form onSubmit={handleSend} className="flex relative items-center gap-2">
                                        <input 
                                            type="text" value={inputText} onChange={(e) => setInputText(e.target.value)}
                                            placeholder="Secure Message" 
                                            className="flex-1 bg-[var(--surface)] border border-[var(--border)] rounded-full py-2.5 pl-5 pr-12 text-[15px] outline-none"
                                        />
                                        <button type="submit" disabled={!inputText.trim()} 
                                            className={`absolute right-1.5 w-8 h-8 rounded-full flex items-center justify-center bg-[var(--primary)] text-white transition-opacity ${!inputText.trim() ? 'opacity-0 pointer-events-none' : 'opacity-100 btn-press'}`}>
                                            <i className="ph-bold ph-arrow-up text-sm"></i>
                                        </button>
                                    </form>
                                </div>
                            </React.Fragment>
                        ) : (
                            <div className="hidden md:flex flex-1 items-center justify-center flex-col opacity-10">
                                <i className="ph-fill ph-lock-key text-8xl mb-4"></i>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
