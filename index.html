<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="GhostChat">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/3064/3064048.png">
    <link rel="manifest" href="./manifest.json">
    <title>Ghost Protocol V5</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>

    <style>
        :root {
            --bg-dark: #000000; --surface: #1C1C1E; --primary: #0A84FF;
            --text-main: #FFFFFF; --text-muted: rgba(235, 235, 245, 0.6);
            --border: rgba(84, 84, 88, 0.65); --danger: #FF453A; --success: #34C759;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", Arial, sans-serif; background-color: var(--bg-dark); color: var(--text-main); overscroll-behavior-y: none; -webkit-font-smoothing: antialiased; user-select: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; } .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .glass-panel { background-color: rgba(28, 28, 30, 0.85); backdrop-filter: blur(40px) saturate(200%); -webkit-backdrop-filter: blur(40px) saturate(200%); }
        .btn-press { transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.1s; } .btn-press:active { transform: scale(0.92); opacity: 0.8; }
        .btn-disabled { opacity: 0.5; cursor: not-allowed; }
        input, textarea { user-select: auto; } .selectable-text { user-select: all; -webkit-user-select: all; }
        @keyframes slideDown { 0% { transform: translate(-50%, -100%); opacity: 0; } 100% { transform: translate(-50%, 0); opacity: 1; } }
        @keyframes zoomIn { 0% { transform: scale(1.1); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes fade { 0% { opacity: 0; } 100% { opacity: 1; } }
        .toast-enter { animation: slideDown 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; } .modal-enter { animation: fade 0.3s ease-out forwards; } .dialog-enter { animation: zoomIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        
        /* Message Selection & Call Styles */
        .msg-selected { background-color: rgba(10, 132, 255, 0.2) !important; border: 1px solid var(--primary) !important; }
        .call-video { width: 100%; height: 100%; object-fit: cover; background-color: #000; }
        .local-video { position: absolute; bottom: 20px; right: 20px; width: 100px; height: 150px; border-radius: 12px; border: 2px solid rgba(255,255,255,0.2); object-fit: cover; background-color: #333; z-index: 50; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => { navigator.serviceWorker.register('./sw.js').catch(()=>{}); });
        }
    </script>
    <script type="text/babel">
        // ==========================================
        // [CORE ENGINE]
        // ==========================================
        const DICT = ["air", "api", "angin", "bumi", "batu", "bulan", "bintang", "cahaya", "cinta", "damai", "daun", "dunia", "emas", "embun", "fajar", "guntur", "gunung", "hutan", "hujan", "indah", "jalan", "jiwa", "kaca", "kayu", "langit", "laut", "mata", "mimpi", "naga", "nada", "ombak", "pasir", "pelangi", "pohon", "raja", "ratu", "sungai", "surya", "tanah", "timur", "utara", "waktu", "awan", "bara", "bayang", "biru", "bukit", "bunga", "burung", "cakar", "cerah", "cincin", "darah", "darat", "dewa", "dingin", "elang", "gading", "gelap", "gema", "gerbang", "gurun", "hampa", "harimau", "hitam", "hiu", "istana", "kabut", "karang", "kilat", "kristal", "kuda", "kuning", "lembah", "macan", "malam", "merah", "merpati", "mitos", "panah", "panas", "pedang", "perak", "petir", "pijar", "pulau", "purnama", "putih", "rahasia", "rimba", "ruang", "samudra", "sayap", "senja", "singa", "suara", "tajam", "tombak", "udara", "ular"];
        const withTimeout = (promise, ms, errorMsg) => Promise.race([promise, new Promise((_, reject) => setTimeout(() => reject(new Error(errorMsg)), ms))]);

        const CryptoUtils = {
            async generateKeypair() { return await window.crypto.subtle.generateKey({ name: "ECDH", namedCurve: "P-256" }, true, ["deriveKey", "deriveBits"]); },
            async exportKeyJWK(key) { return await window.crypto.subtle.exportKey("jwk", key); },
            async importPublicKey(jwk) { return await window.crypto.subtle.importKey("jwk", jwk, { name: "ECDH", namedCurve: "P-256" }, true, []); },
            async importPrivateKey(jwk) { return await window.crypto.subtle.importKey("jwk", jwk, { name: "ECDH", namedCurve: "P-256" }, true, ["deriveKey", "deriveBits"]); },
            async deriveWrapKey(passphrase, salt) {
                const enc = new TextEncoder();
                const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(passphrase), { name: "PBKDF2" }, false, ["deriveKey"]);
                return await crypto.subtle.deriveKey({ name: "PBKDF2", salt: enc.encode(salt), iterations: 20000, hash: "SHA-256" }, keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]);
            },
            async deriveSharedSecret(privateKey, publicKeyJWK) {
                const publicKey = await this.importPublicKey(publicKeyJWK);
                return await window.crypto.subtle.deriveKey({ name: "ECDH", public: publicKey }, privateKey, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]);
            },
            async encryptText(text, sharedKey) {
                const iv = window.crypto.getRandomValues(new Uint8Array(12));
                const encoded = new TextEncoder().encode(text);
                const ciphertext = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, sharedKey, encoded);
                return { type: 'text', iv: Array.from(iv), data: Array.from(new Uint8Array(ciphertext)) };
            },
            async encryptBinary(arrayBuffer, sharedKey, fileType) {
                const iv = window.crypto.getRandomValues(new Uint8Array(12));
                const ciphertext = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, sharedKey, arrayBuffer);
                const base64String = btoa(new Uint8Array(ciphertext).reduce((data, byte) => data + String.fromCharCode(byte), ''));
                return { type: fileType, iv: Array.from(iv), data: base64String };
            },
            async decryptPayload(payload, sharedKey) {
                try {
                    const iv = new Uint8Array(payload.iv);
                    if (['audio', 'image', 'video'].includes(payload.type)) {
                        const binaryStr = atob(payload.data);
                        const encryptedBytes = new Uint8Array(binaryStr.length);
                        for (let i = 0; i < binaryStr.length; i++) encryptedBytes[i] = binaryStr.charCodeAt(i);
                        const decrypted = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, sharedKey, encryptedBytes);
                        let mime = 'application/octet-stream';
                        if(payload.type === 'audio') mime = 'audio/webm'; else if(payload.type === 'image') mime = 'image/jpeg'; else if(payload.type === 'video') mime = 'video/mp4';
                        return { type: payload.type, data: new Blob([decrypted], { type: mime }) };
                    } else {
                        const data = new Uint8Array(payload.data || payload);
                        const decrypted = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, sharedKey, data);
                        return { type: 'text', data: new TextDecoder().decode(decrypted) };
                    }
                } catch (e) { return { type: 'error', data: "🔒 [Decryption Failed]" }; }
            }
        };

        const LocalDB = {
            async init() {
                return withTimeout(new Promise((resolve, reject) => {
                    const req = indexedDB.open("GhostProtocolDB_V5", 1);
                    req.onupgradeneeded = e => { e.target.result.createObjectStore("identity", { keyPath: "id" }); };
                    req.onsuccess = e => resolve(e.target.result); req.onerror = e => reject(new Error("LocalDB Error"));
                }), 4000, "Akses memori lokal gagal. Matikan mode Incognito.");
            },
            async saveIdentity(code, privateKeyJWK, publicKeyJWK, displayName) {
                const db = await this.init();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction("identity", "readwrite");
                    tx.objectStore("identity").put({ id: "active", code, privateKeyJWK, publicKeyJWK, displayName });
                    tx.oncomplete = () => resolve(); tx.onerror = () => reject(tx.error);
                });
            },
            async getIdentity() {
                const db = await this.init();
                return new Promise((resolve) => {
                    if (!db.objectStoreNames.contains("identity")) return resolve(null);
                    const req = db.transaction("identity", "readonly").objectStore("identity").get("active");
                    req.onsurnsuccess = () => resolve(req.result); req.onerror = () => resolve(null);
                });
            },
            async wipeData() {
                const db = await this.init();
                return new Promise((resolve) => {
                    if (!db.objectStoreNames.contains("identity")) return resolve();
                    const tx = db.transaction("identity", "readwrite");
                    tx.objectStore("identity").clear(); tx.oncomplete = () => resolve();
                });
            }
        };

        const firebaseConfig = { apiKey: "AIzaSyCftdtKP4vYY9DQSWwWkFoKXv-ceWh12WQ", authDomain: "ghost-chat-e2ee.firebaseapp.com", projectId: "ghost-chat-e2ee", storageBucket: "ghost-chat-e2ee.firebasestorage.app", messagingSenderId: "951286040813", appId: "1:951286040813:web:5f848f381cdcedaa6de4e4" };
        const STUN_SERVERS = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

        // ==========================================
        // [MAIN APPLICATION]
        // ==========================================
        const App = () => {
            const [fbReady, setFbReady] = React.useState(false);
            const [fbModules, setFbModules] = React.useState(null);
            
            const [sysError, setSysError] = React.useState(null);
            const [loadingState, setLoadingState] = React.useState("");
            const [authView, setAuthView] = React.useState("choice"); 
            
            const [identity, setIdentity] = React.useState(null);
            const [friends, setFriends] = React.useState([]);
            const [activeChat, setActiveChat] = React.useState(null);
            const [messages, setMessages] = React.useState([]);
            const [decryptedCache, setDecryptedCache] = React.useState({});

            const [setupName, setSetupName] = React.useState("");
            const [recoveryKeyInput, setRecoveryKeyInput] = React.useState("");
            const [generatedRecoveryKey, setGeneratedRecoveryKey] = React.useState("");
            const [inputText, setInputText] = React.useState('');
            const [isRecording, setIsRecording] = React.useState(false);
            const [addCodeInput, setAddCodeInput] = React.useState("");
            
            // UI States
            const [activeModal, setActiveModal] = React.useState(null);
            const [toast, setToast] = React.useState(null);
            const [dialog, setDialog] = React.useState({ show: false, title: '', msg: '', onConfirm: null, isDestructive: false });
            const [chatMenuOpen, setChatMenuOpen] = React.useState(false);
            
            // Selection States
            const [isSelecting, setIsSelecting] = React.useState(false);
            const [selectedMsgs, setSelectedMsgs] = React.useState([]);

            // WebRTC States
            const [rtcState, setRtcState] = React.useState(null); // 'calling', 'receiving', 'connected'
            const [callType, setCallType] = React.useState('video'); // 'video' | 'audio'

            const messagesEndRef = React.useRef(null);
            const mediaRecorderRef = React.useRef(null);
            const audioChunksRef = React.useRef([]);
            const fileInputRef = React.useRef(null);
            
            // WebRTC Refs
            const pcRef = React.useRef(null);
            const localStreamRef = React.useRef(null);
            const localVideoRef = React.useRef(null);
            const remoteVideoRef = React.useRef(null);
            const callRoomIdRef = React.useRef(null);

            const showToast = (msg, icon = "ph-info") => { setToast({ msg, icon }); setTimeout(() => setToast(null), 3000); };
            const triggerDialog = (title, msg, onConfirm, isDestructive = false) => { setDialog({ show: true, title, msg, onConfirm, isDestructive }); setChatMenuOpen(false); };
            const pushOSNotification = (title, body) => { if ("Notification" in window && Notification.permission === "granted" && document.hidden) new Notification(title, { body, icon: "https://cdn-icons-png.flaticon.com/512/3064/3064048.png" }); };

            // [BOOT SEQUENCE]
            React.useEffect(() => {
                let unsubscribeAuth = null;
                const initSystem = async () => {
                    try {
                        setLoadingState("Connecting to Core Backend...");
                        const importModule = new Function('url', 'return import(url)');
                        const fbApp = await importModule('https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js');
                        const fbAuth = await importModule('https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js');
                        const fbDb = await importModule('https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js');
                        
                        const app = !fbApp.getApps().length ? fbApp.initializeApp(firebaseConfig) : fbApp.getApp();
                        const auth = fbAuth.getAuth(app);
                        const db = fbDb.getFirestore(app);

                        setFbModules({ auth, db, fbAuth, fbDb, arrayUnion: fbDb.arrayUnion });
                        await fbAuth.signInAnonymously(auth);
                        if ("Notification" in window && Notification.permission === "default") Notification.requestPermission();

                        unsubscribeAuth = fbAuth.onAuthStateChanged(auth, async (u) => {
                            if (u) {
                                setLoadingState("Verifying Identity Engine...");
                                const localData = await LocalDB.getIdentity();
                                if (localData) {
                                    try {
                                        const privKey = await CryptoUtils.importPrivateKey(localData.privateKeyJWK);
                                        setIdentity({ code: localData.code, privateKey: privKey, publicKeyJWK: localData.publicKeyJWK, displayName: localData.displayName });
                                        setAuthView("main");
                                    } catch (e) { setSysError("Kunci korup. Reset diperlukan."); await LocalDB.wipeData(); }
                                }
                                setFbReady(true); setLoadingState("");
                            }
                        });
                    } catch (err) { setSysError(`BOOT_FAILED: ${err.message}`); }
                };
                initSystem();
                return () => { if (unsubscribeAuth) unsubscribeAuth(); };
            }, []);

            React.useEffect(() => { if(!isSelecting) messagesEndRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages, decryptedCache, isSelecting]);

            // [SYNC & CHAT WORKERS]
            React.useEffect(() => {
                if (!fbReady || !identity || authView !== "main") return;
                const { db, fbDb } = fbModules;
                const unsubContacts = fbDb.onSnapshot(fbDb.collection(db, 'users', identity.code, 'contacts'), (snap) => setFriends(snap.docs.map(d => d.data())));
                return () => unsubContacts();
            }, [fbReady, identity, authView]);

            React.useEffect(() => {
                if (!fbReady || !identity || !activeChat || authView !== "main") return;
                const { db, fbDb } = fbModules;
                const chatId = [identity.code, activeChat.code].sort().join('_');
                
                // 1. Messages Listener
                const unsubChat = fbDb.onSnapshot(fbDb.collection(db, `chats_${chatId}`), async (snapshot) => {
                    // Filter Soft Deleted
                    let msgs = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                    msgs = msgs.filter(m => !(m.deletedFor || []).includes(identity.code));
                    msgs.sort((a, b) => a.timestamp - b.timestamp);
                    setMessages(msgs);

                    const sharedSecret = await CryptoUtils.deriveSharedSecret(identity.privateKey, activeChat.publicKeyJWK);
                    const newDecrypted = { ...decryptedCache };
                    let changed = false;

                    for (let msg of msgs) {
                        if (!newDecrypted[msg.id]) {
                            const clearData = await CryptoUtils.decryptPayload(msg.payload, sharedSecret);
                            if (['audio', 'image', 'video'].includes(clearData.type)) newDecrypted[msg.id] = { type: clearData.type, url: URL.createObjectURL(clearData.data) };
                            else newDecrypted[msg.id] = { type: 'text', text: clearData.data };
                            changed = true;
                        }
                    }
                    if (changed) setDecryptedCache(newDecrypted);
                });

                // 2. Signaling Listener (WebRTC Incoming)
                const unsubSignal = fbDb.onSnapshot(fbDb.doc(db, `chats_${chatId}_signal`, 'room'), (doc) => {
                    const data = doc.data();
                    if (!data) return;
                    
                    // Trigger Incoming Call
                    if (data.offer && data.caller !== identity.code && !rtcState) {
                        setCallType(data.callType || 'video');
                        setRtcState('receiving');
                    }
                    // Handle Call End
                    if (data.hangup && rtcState) {
                        endCallCleanup();
                        showToast("Panggilan Diakhiri", "ph-phone-slash");
                    }
                });

                return () => { unsubChat(); unsubSignal(); endCallCleanup(); };
            }, [fbReady, identity, activeChat, authView]);

            // [WEBRTC ENGINE]
            const setupMediaTracks = async (video) => {
                const stream = await navigator.mediaDevices.getUserMedia({ video, audio: true });
                localStreamRef.current = stream;
                if (localVideoRef.current) localVideoRef.current.srcObject = stream;
                stream.getTracks().forEach(track => pcRef.current.addTrack(track, stream));
            };

            const endCallCleanup = async () => {
                if (pcRef.current) { pcRef.current.close(); pcRef.current = null; }
                if (localStreamRef.current) { localStreamRef.current.getTracks().forEach(t => t.stop()); localStreamRef.current = null; }
                setRtcState(null);
            };

            const initiateCall = async (type) => {
                setChatMenuOpen(false); setCallType(type); setRtcState('calling');
                const { db, fbDb } = fbModules;
                const chatId = [identity.code, activeChat.code].sort().join('_');
                const roomRef = fbDb.doc(db, `chats_${chatId}_signal`, 'room');
                const callerCandidatesRef = fbDb.collection(db, `chats_${chatId}_signal`, 'room', 'callerCandidates');
                
                pcRef.current = new RTCPeerConnection(STUN_SERVERS);
                
                pcRef.current.onicecandidate = event => {
                    if(event.candidate) fbDb.addDoc(callerCandidatesRef, event.candidate.toJSON());
                };
                pcRef.current.ontrack = event => {
                    if(remoteVideoRef.current) remoteVideoRef.current.srcObject = event.streams[0];
                };

                await setupMediaTracks(type === 'video');

                const offer = await pcRef.current.createOffer();
                await pcRef.current.setLocalDescription(offer);

                await fbDb.setDoc(roomRef, { offer: { type: offer.type, sdp: offer.sdp }, caller: identity.code, callType: type, hangup: false });

                // Listen for Answer
                const unsub = fbDb.onSnapshot(roomRef, async snapshot => {
                    const data = snapshot.data();
                    if (!pcRef.current?.currentRemoteDescription && data?.answer) {
                        await pcRef.current.setRemoteDescription(new RTCSessionDescription(data.answer));
                        setRtcState('connected');
                    }
                });

                // Listen for Remote ICE
                fbDb.onSnapshot(fbDb.collection(db, `chats_${chatId}_signal`, 'room', 'calleeCandidates'), snapshot => {
                    snapshot.docChanges().forEach(async change => {
                        if (change.type === 'added' && pcRef.current) await pcRef.current.addIceCandidate(new RTCIceCandidate(change.doc.data()));
                    });
                });
            };

            const answerCall = async () => {
                setRtcState('connected');
                const { db, fbDb } = fbModules;
                const chatId = [identity.code, activeChat.code].sort().join('_');
                const roomRef = fbDb.doc(db, `chats_${chatId}_signal`, 'room');
                const calleeCandidatesRef = fbDb.collection(db, `chats_${chatId}_signal`, 'room', 'calleeCandidates');

                pcRef.current = new RTCPeerConnection(STUN_SERVERS);
                
                pcRef.current.onicecandidate = event => {
                    if(event.candidate) fbDb.addDoc(calleeCandidatesRef, event.candidate.toJSON());
                };
                pcRef.current.ontrack = event => {
                    if(remoteVideoRef.current) remoteVideoRef.current.srcObject = event.streams[0];
                };

                await setupMediaTracks(callType === 'video');

                const roomSnapshot = await fbDb.getDoc(roomRef);
                const roomData = roomSnapshot.data();
                await pcRef.current.setRemoteDescription(new RTCSessionDescription(roomData.offer));
                
                const answer = await pcRef.current.createAnswer();
                await pcRef.current.setLocalDescription(answer);
                await fbDb.updateDoc(roomRef, { answer: { type: answer.type, sdp: answer.sdp } });

                // Listen for Remote ICE
                fbDb.onSnapshot(fbDb.collection(db, `chats_${chatId}_signal`, 'room', 'callerCandidates'), snapshot => {
                    snapshot.docChanges().forEach(async change => {
                        if (change.type === 'added' && pcRef.current) await pcRef.current.addIceCandidate(new RTCIceCandidate(change.doc.data()));
                    });
                });
            };

            const hangupCall = async () => {
                const { db, fbDb } = fbModules;
                const chatId = [identity.code, activeChat.code].sort().join('_');
                await fbDb.updateDoc(fbDb.doc(db, `chats_${chatId}_signal`, 'room'), { hangup: true });
                endCallCleanup();
            };


            // [DELETION LOGIC]
            const toggleSelection = (id) => {
                setSelectedMsgs(prev => prev.includes(id) ? prev.filter(m => m !== id) : [...prev, id]);
            };

            const executeDelete = async (type) => {
                if (selectedMsgs.length === 0) return;
                setDialog({show: false}); setToast({msg: "Menghapus...", icon: "ph-spinner animate-spin"});
                const { db, fbDb, arrayUnion } = fbModules;
                const chatId = [identity.code, activeChat.code].sort().join('_');
                
                try {
                    for (let msgId of selectedMsgs) {
                        const msgRef = fbDb.doc(db, `chats_${chatId}`, msgId);
                        if (type === 'me') await fbDb.updateDoc(msgRef, { deletedFor: arrayUnion(identity.code) });
                        else if (type === 'all') await fbDb.deleteDoc(msgRef); // Hard Delete
                    }
                    showToast("Pesan Dihapus", "ph-trash");
                } catch(e) { showToast("Gagal menghapus", "ph-warning"); }
                finally { setIsSelecting(false); setSelectedMsgs([]); }
            };

            const clearAllChats = async () => {
                setDialog({show: false}); setToast({msg: "Membersihkan Riwayat...", icon: "ph-spinner animate-spin"});
                const { db, fbDb, arrayUnion } = fbModules;
                const chatId = [identity.code, activeChat.code].sort().join('_');
                try {
                    for (let msg of messages) {
                        await fbDb.updateDoc(fbDb.doc(db, `chats_${chatId}`, msg.id), { deletedFor: arrayUnion(identity.code) });
                    }
                    showToast("Riwayat Bersih", "ph-check-circle");
                } catch(e) { showToast("Gagal membersihkan", "ph-warning"); }
            };


            // [MESSAGING LOGIC]
            const sendEncryptedPayload = async (payloadData) => {
                const { db, fbDb } = fbModules;
                const chatId = [identity.code, activeChat.code].sort().join('_');
                await fbDb.addDoc(fbDb.collection(db, `chats_${chatId}`), { sender: identity.code, timestamp: Date.now(), payload: payloadData, status: 'sent', deletedFor: [] });
            };

            const handleSendText = async (e) => {
                e.preventDefault();
                if (!inputText.trim() || !activeChat || !fbModules) return;
                const text = inputText.trim(); setInputText("");
                try {
                    const sharedSecret = await CryptoUtils.deriveSharedSecret(identity.privateKey, activeChat.publicKeyJWK);
                    const encryptedPayload = await CryptoUtils.encryptText(text, sharedSecret);
                    await sendEncryptedPayload(encryptedPayload);
                } catch (error) { showToast("Gagal enkripsi teks.", "ph-warning"); }
            };

            // Auth UI Renders remain similar, skipped for brevity in comment, included in full code.
            const renderAuthUI = () => { /* ... */ };

            if (!fbReady) return <div className="h-screen bg-[var(--bg-dark)] flex items-center justify-center"><i className="ph ph-spinner-gap animate-spin text-3xl text-[var(--primary)]"></i></div>;

            return (
                <div className="flex h-screen w-full overflow-hidden relative">
                    {/* GLOBAL UI ELEMENTS (Toasts, Modals) */}
                    {toast && (
                        <div className="absolute top-4 left-1/2 transform -translate-x-1/2 z-[100] toast-enter w-[90%] max-w-[320px]">
                            <div className="glass-panel px-5 py-3 rounded-full flex items-center gap-3 shadow-lg border border-white/10 justify-center">
                                <i className={`text-xl text-[var(--primary)] ${toast.icon}`}></i>
                                <span className="text-sm font-semibold truncate">{toast.msg}</span>
                            </div>
                        </div>
                    )}

                    {dialog.show && (
                        <div className="absolute inset-0 z-[100] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm modal-enter">
                            <div className="bg-[var(--surface)] w-full max-w-[300px] rounded-2xl flex flex-col items-center text-center dialog-enter shadow-2xl border border-[var(--border)] overflow-hidden">
                                <div className="p-6 pb-5"><h3 className="font-bold text-lg mb-1">{dialog.title}</h3><p className="text-sm text-[var(--text-muted)] leading-tight">{dialog.msg}</p></div>
                                <div className="flex w-full border-t border-[var(--border)] flex-col">
                                    {dialog.onConfirm && <button onClick={dialog.onConfirm} className={`w-full py-3.5 font-bold btn-press border-b border-[var(--border)] ${dialog.isDestructive ? 'text-[var(--danger)]' : 'text-[var(--primary)]'}`}>Setuju</button>}
                                    <button onClick={() => setDialog({show:false})} className="w-full py-3.5 text-[var(--primary)] font-semibold btn-press">Batal</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* CALL OVERLAY */}
                    {rtcState && (
                        <div className="absolute inset-0 z-[80] bg-black flex flex-col modal-enter">
                            {rtcState === 'receiving' ? (
                                <div className="flex-1 flex flex-col items-center justify-center bg-[var(--surface)]">
                                    <div className="w-24 h-24 rounded-full bg-gradient-to-tr from-blue-500 to-cyan-400 flex items-center justify-center text-4xl text-white shadow-[0_0_50px_rgba(10,132,255,0.4)] animate-pulse mb-6">{activeChat?.displayName.charAt(0)}</div>
                                    <h2 className="text-2xl font-bold mb-1">{activeChat?.displayName}</h2>
                                    <p className="text-[var(--text-muted)] mb-12">Panggilan {callType === 'video' ? 'Video' : 'Suara'} E2EE...</p>
                                    <div className="flex gap-8">
                                        <button onClick={hangupCall} className="w-16 h-16 rounded-full bg-[var(--danger)] flex items-center justify-center btn-press"><i className="ph-fill ph-phone-slash text-3xl text-white"></i></button>
                                        <button onClick={answerCall} className="w-16 h-16 rounded-full bg-[var(--success)] flex items-center justify-center btn-press animate-bounce"><i className="ph-fill ph-phone text-3xl text-white"></i></button>
                                    </div>
                                </div>
                            ) : (
                                <div className="flex-1 relative bg-black">
                                    <video ref={remoteVideoRef} autoPlay playsInline className="call-video"></video>
                                    {callType === 'video' && <video ref={localVideoRef} autoPlay playsInline muted className="local-video"></video>}
                                    
                                    <div className="absolute top-12 w-full text-center z-50">
                                        <h2 className="text-xl font-bold drop-shadow-md">{activeChat?.displayName}</h2>
                                        <p className="text-sm text-white/80">{rtcState === 'calling' ? 'Menghubungi...' : 'Terenkripsi WebRTC'}</p>
                                    </div>

                                    <div className="absolute bottom-10 w-full flex justify-center z-50">
                                        <button onClick={hangupCall} className="w-16 h-16 rounded-full bg-[var(--danger)] flex items-center justify-center btn-press shadow-lg border-2 border-white/20"><i className="ph-fill ph-phone-slash text-3xl text-white"></i></button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {authView === "main" && (
                        <React.Fragment>
                            <div className={`w-full md:w-[360px] flex-shrink-0 flex flex-col border-r border-[var(--border)] transition-transform z-10 ${activeChat ? '-translate-x-full md:translate-x-0 absolute md:relative h-full' : 'translate-x-0 relative h-full'}`}>
                                <div className="glass-panel px-5 pt-14 pb-4 sticky top-0 z-20 border-b border-[var(--border)]">
                                    <div className="flex justify-between items-end mb-1">
                                        <h1 className="text-4xl font-bold tracking-tight">Obrolan</h1>
                                        <button onClick={() => triggerDialog("Hapus Data & Log Out", "Keluar dari sesi E2EE?", executeLogout, true)} className="text-[var(--text-muted)] text-sm font-semibold">Log Out</button>
                                    </div>
                                </div>
                                <div className="flex-1 overflow-y-auto hide-scrollbar">
                                    {friends.map((f) => (
                                        <div key={f.code} onClick={() => setActiveChat(f)} className="cursor-pointer px-5 py-3 flex items-center gap-4 hover:bg-white/5 border-b border-[var(--border)]">
                                            <div className="w-14 h-14 rounded-full bg-gradient-to-tr from-blue-500 to-cyan-400 flex items-center justify-center font-bold text-xl text-white">{f.displayName.charAt(0)}</div>
                                            <div className="flex-1"><h3 className="font-bold text-[18px]">{f.displayName}</h3><p className="text-[14px] text-[var(--text-muted)] font-mono">#{f.code}</p></div>
                                        </div>
                                    ))}
                                </div>
                            </div>

                            <div className={`flex-1 flex flex-col slide-panel absolute md:relative w-full h-full z-20 bg-[var(--bg-dark)] ${activeChat ? 'translate-x-0' : 'translate-x-full md:translate-x-0'}`}>
                                {activeChat && (
                                    <React.Fragment>
                                        {/* HEADER DYNAMIC */}
                                        <div className="glass-panel px-3 pt-12 pb-3 flex items-center sticky top-0 z-30 border-b border-[var(--border)] shadow-sm">
                                            {isSelecting ? (
                                                <div className="w-full flex items-center justify-between px-2">
                                                    <button onClick={() => {setIsSelecting(false); setSelectedMsgs([]);}} className="text-[var(--primary)] font-semibold text-lg">Batal</button>
                                                    <span className="font-bold text-lg">{selectedMsgs.length} Terpilih</span>
                                                    <button onClick={() => {
                                                        if(selectedMsgs.length===0)return;
                                                        setDialog({show:true, title:"Hapus Pesan", msg:`Pilih metode penghapusan untuk ${selectedMsgs.length} pesan.`, isDestructive:true, 
                                                            onConfirm: () => executeDelete('all')
                                                        });
                                                        // Inject Custom Action for Delete Me
                                                        setToast({msg:"Opsi 'Hapus untuk Saya' juga tersedia di menu", icon:"ph-info"});
                                                    }} className="text-[var(--danger)]"><i className="ph-fill ph-trash text-2xl"></i></button>
                                                </div>
                                            ) : (
                                                <div className="w-full flex items-center relative">
                                                    <button onClick={() => setActiveChat(null)} className="md:hidden flex items-center py-2 pr-2 text-[var(--primary)]"><i className="ph-bold ph-caret-left text-3xl -ml-2"></i></button>
                                                    <div className="w-10 h-10 rounded-full bg-gradient-to-tr from-blue-500 to-cyan-400 flex items-center justify-center font-bold mr-3 text-white">{activeChat.displayName.charAt(0)}</div>
                                                    <div className="flex flex-col"><span className="font-bold text-[16px] text-white leading-tight">{activeChat.displayName}</span></div>
                                                    
                                                    <div className="ml-auto flex gap-4 pr-1 relative">
                                                        <button onClick={() => initiateCall('video')} className="text-[var(--primary)]"><i className="ph-fill ph-video-camera text-2xl"></i></button>
                                                        <button onClick={() => initiateCall('audio')} className="text-[var(--primary)]"><i className="ph-fill ph-phone text-2xl"></i></button>
                                                        <button onClick={() => setChatMenuOpen(!chatMenuOpen)} className="text-[var(--primary)]"><i className="ph-bold ph-dots-three-circle text-2xl"></i></button>
                                                        
                                                        {/* DROPDOWN MENU */}
                                                        {chatMenuOpen && (
                                                            <div className="absolute top-10 right-0 w-48 bg-[var(--surface)] border border-[var(--border)] rounded-2xl shadow-2xl py-2 z-50">
                                                                <button onClick={() => {setIsSelecting(true); setChatMenuOpen(false);}} className="w-full text-left px-4 py-3 border-b border-[var(--border)] font-semibold active:bg-white/10">Pilih Pesan</button>
                                                                <button onClick={() => triggerDialog("Bersihkan Obrolan", "Menghapus seluruh riwayat chat untuk Anda?", clearAllChats, true)} className="w-full text-left px-4 py-3 text-[var(--danger)] font-semibold active:bg-white/10">Bersihkan Chat</button>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        <div className="flex-1 overflow-y-auto px-4 py-5 flex flex-col gap-[4px] hide-scrollbar relative" onClick={() => setChatMenuOpen(false)}>
                                            {messages.map((msg, index, arr) => {
                                                const isMe = msg.sender === identity.code;
                                                const isLast = !arr[index + 1] || arr[index + 1].sender !== msg.sender;
                                                const content = decryptedCache[msg.id];
                                                const isSelected = selectedMsgs.includes(msg.id);

                                                return (
                                                    <div key={msg.id} onClick={() => isSelecting && toggleSelection(msg.id)} 
                                                        className={`flex w-full ${isMe ? 'justify-end' : 'justify-start'} ${isLast ? 'mb-4' : ''} ${isSelecting ? 'cursor-pointer' : ''}`}>
                                                        
                                                        {isSelecting && <div className="w-6 h-6 rounded-full border border-[var(--border)] mr-3 flex items-center justify-center mt-2">{isSelected && <div className="w-4 h-4 rounded-full bg-[var(--primary)]"></div>}</div>}
                                                        
                                                        <div className={`max-w-[80%] px-[16px] py-[10px] text-[16px] leading-[1.4] break-words overflow-hidden shadow-sm transition-colors
                                                                ${isSelected ? 'msg-selected' : isMe ? 'bg-[var(--primary)] text-white rounded-[20px] rounded-br-[4px]' : 'bg-[var(--surface)] text-white rounded-[20px] rounded-bl-[4px] border border-white/5'}`}>
                                                            {!content ? <i className="ph animate-spin ph-spinner"></i> : 
                                                             content.type === 'audio' ? <audio controls src={content.url} className="h-10 w-48 custom-audio"></audio> :
                                                             content.text}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                            <div ref={messagesEndRef} className="h-6"></div>
                                        </div>

                                        {!isSelecting && (
                                            <div className="glass-panel p-3 pb-8 md:pb-4 z-30 border-t border-[var(--border)]">
                                                <form onSubmit={handleSendText} className="flex relative items-end gap-3 max-w-4xl mx-auto">
                                                    <div className="flex-1 relative">
                                                        <textarea value={inputText} onChange={(e) => setInputText(e.target.value)} placeholder="iMessage" rows="1" className="w-full bg-[var(--surface)] border border-[var(--border)] rounded-3xl py-[10px] pl-5 pr-12 text-[16px] outline-none text-white focus:border-[var(--text-muted)] transition-colors resize-none hide-scrollbar" style={{ minHeight: '44px', maxHeight: '120px' }} onInput={(e) => { e.target.style.height = 'auto'; e.target.style.height = (e.target.scrollHeight) + 'px'; }} />
                                                    </div>
                                                    <button type="submit" disabled={!inputText.trim()} className={`w-[42px] h-[42px] mb-0.5 flex-shrink-0 rounded-full flex items-center justify-center text-white shadow-md transition-all ${inputText.trim() ? 'bg-[var(--primary)] btn-press' : 'bg-[var(--surface)] border border-[var(--border)] btn-disabled'}`}><i className="ph-bold ph-arrow-up text-xl"></i></button>
                                                </form>
                                            </div>
                                        )}
                                    </React.Fragment>
                                )}
                            </div>
                        </React.Fragment>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
