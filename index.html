    <script type="text/babel">
        const swLogic = `
            self.addEventListener('push', function(event) {
                if (event.data) {
                    const data = event.data.json();
                    self.registration.showNotification(data.title, { body: data.body, icon: data.icon });
                }
            });
            self.addEventListener('notificationclick', function(event) {
                event.notification.close();
                event.waitUntil(clients.matchAll({type: 'window'}).then(clientList => {
                    for (let i = 0; i < clientList.length; i++) {
                        let client = clientList[i];
                        if (client.url === '/' && 'focus' in client) return client.focus();
                    }
                    if (clients.openWindow) return clients.openWindow('/');
                }));
            });
        `;
        const blob = new Blob([swLogic], { type: 'application/javascript' });
        const swUrl = URL.createObjectURL(blob);
        if ('serviceWorker' in navigator) navigator.serviceWorker.register(swUrl).catch(()=>{});

        const DICT = ["air", "api", "angin", "bumi", "batu", "bulan", "bintang", "cahaya", "cinta", "damai", "dunia", "emas", "embun", "fajar"];
        const withTimeout = (promise, ms, errorMsg) => Promise.race([promise, new Promise((_, reject) => setTimeout(() => reject(new Error(errorMsg)), ms))]);

        const CryptoUtils = {
            async generateKeypair() { return await window.crypto.subtle.generateKey({ name: "ECDH", namedCurve: "P-256" }, true, ["deriveKey", "deriveBits"]); },
            async exportKeyJWK(key) { return await window.crypto.subtle.exportKey("jwk", key); },
            async importPublicKey(jwk) { return await window.crypto.subtle.importKey("jwk", jwk, { name: "ECDH", namedCurve: "P-256" }, true, []); },
            async importPrivateKey(jwk) { return await window.crypto.subtle.importKey("jwk", jwk, { name: "ECDH", namedCurve: "P-256" }, true, ["deriveKey", "deriveBits"]); },
            async deriveWrapKey(passphrase, salt) {
                const enc = new TextEncoder();
                const keyMaterial = await crypto.subtle.importKey("raw", enc.encode(passphrase), { name: "PBKDF2" }, false, ["deriveKey"]);
                return await crypto.subtle.deriveKey({ name: "PBKDF2", salt: enc.encode(salt), iterations: 20000, hash: "SHA-256" }, keyMaterial, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]);
            },
            async deriveSharedSecret(privateKey, publicKeyJWK) {
                const publicKey = await this.importPublicKey(publicKeyJWK);
                return await window.crypto.subtle.deriveKey({ name: "ECDH", public: publicKey }, privateKey, { name: "AES-GCM", length: 256 }, false, ["encrypt", "decrypt"]);
            },
            async encryptText(text, sharedKey) {
                const iv = window.crypto.getRandomValues(new Uint8Array(12));
                const encoded = new TextEncoder().encode(text);
                const ciphertext = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, sharedKey, encoded);
                return { type: 'text', iv: Array.from(iv), data: Array.from(new Uint8Array(ciphertext)) };
            },
            async encryptBinary(arrayBuffer, sharedKey, fileType) {
                const iv = window.crypto.getRandomValues(new Uint8Array(12));
                const ciphertext = await window.crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, sharedKey, arrayBuffer);
                const base64String = btoa(new Uint8Array(ciphertext).reduce((data, byte) => data + String.fromCharCode(byte), ''));
                return { type: fileType, iv: Array.from(iv), data: base64String };
            },
            async decryptPayload(payload, sharedKey) {
                try {
                    const iv = new Uint8Array(payload.iv);
                    if (['audio', 'image', 'video'].includes(payload.type)) {
                        const binaryStr = atob(payload.data);
                        const encryptedBytes = new Uint8Array(binaryStr.length);
                        for (let i = 0; i < binaryStr.length; i++) encryptedBytes[i] = binaryStr.charCodeAt(i);
                        const decrypted = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, sharedKey, encryptedBytes);
                        let mime = 'application/octet-stream';
                        if(payload.type === 'audio') mime = 'audio/webm'; else if(payload.type === 'image') mime = 'image/jpeg'; else if(payload.type === 'video') mime = 'video/mp4';
                        return { type: payload.type, data: new Blob([decrypted], { type: mime }) };
                    } else {
                        const data = new Uint8Array(payload.data || payload);
                        const decrypted = await window.crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, sharedKey, data);
                        return { type: 'text', data: new TextDecoder().decode(decrypted) };
                    }
                } catch (e) { return { type: 'error', data: "🔒 [Decryption Failed]" }; }
            },
            // STORY KEY WRAPPING E2EE LOGIC
            async generateStoryKey() {
                const rawKey = window.crypto.getRandomValues(new Uint8Array(32));
                const cryptoKey = await crypto.subtle.importKey("raw", rawKey, "AES-GCM", true, ["encrypt", "decrypt"]);
                return { rawKey, cryptoKey };
            },
            async encryptStoryMedia(arrayBuffer, cryptoKey) {
                const iv = window.crypto.getRandomValues(new Uint8Array(12));
                const ciphertext = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, cryptoKey, arrayBuffer);
                return { iv: Array.from(iv), blob: new Blob([ciphertext]) };
            },
            async decryptStoryMedia(encryptedBlob, ivArray, rawKeyArray) {
                const cryptoKey = await crypto.subtle.importKey("raw", new Uint8Array(rawKeyArray), "AES-GCM", false, ["decrypt"]);
                const arrayBuffer = await encryptedBlob.arrayBuffer();
                const decrypted = await crypto.subtle.decrypt({ name: "AES-GCM", iv: new Uint8Array(ivArray) }, cryptoKey, arrayBuffer);
                return decrypted;
            },
            async wrapKeyForFriend(rawKey, sharedSecret) {
                const iv = window.crypto.getRandomValues(new Uint8Array(12));
                const wrapped = await crypto.subtle.encrypt({ name: "AES-GCM", iv: iv }, sharedSecret, rawKey);
                return { iv: Array.from(iv), wrapped: Array.from(new Uint8Array(wrapped)) };
            },
            async unwrapKeyFromFriend(wrappedData, sharedSecret) {
                const iv = new Uint8Array(wrappedData.iv);
                const data = new Uint8Array(wrappedData.wrapped);
                const rawKey = await crypto.subtle.decrypt({ name: "AES-GCM", iv: iv }, sharedSecret, data);
                return Array.from(new Uint8Array(rawKey));
            }
        };

        const LocalDB = {
            async init() {
                return withTimeout(new Promise((resolve, reject) => {
                    const req = indexedDB.open("GhostProtocol_Vault_Persistent", 1);
                    req.onupgradeneeded = e => { e.target.result.createObjectStore("identity", { keyPath: "id" }); };
                    req.onsuccess = e => resolve(e.target.result); req.onerror = e => reject(new Error("LocalDB Error"));
                }), 4000, "Akses memori lokal gagal.");
            },
            async saveIdentity(code, privateKeyJWK, publicKeyJWK, displayName) {
                const db = await this.init();
                return new Promise((resolve, reject) => {
                    const tx = db.transaction("identity", "readwrite");
                    tx.objectStore("identity").put({ id: "active", code, privateKeyJWK, publicKeyJWK, displayName });
                    tx.oncomplete = () => resolve(); tx.onerror = () => reject(tx.error);
                });
            },
            async getIdentity() {
                const db = await this.init();
                return new Promise((resolve) => {
                    if (!db.objectStoreNames.contains("identity")) return resolve(null);
                    const req = db.transaction("identity", "readonly").objectStore("identity").get("active");
                    req.onsuccess = () => resolve(req.result); req.onerror = () => resolve(null);
                });
            },
            async wipeData() {
                const db = await this.init();
                return new Promise((resolve) => {
                    if (!db.objectStoreNames.contains("identity")) return resolve();
                    const tx = db.transaction("identity", "readwrite"); tx.objectStore("identity").clear(); tx.oncomplete = () => resolve();
                });
            }
        };

        const firebaseConfig = { apiKey: "AIzaSyCftdtKP4vYY9DQSWwWkFoKXv-ceWh12WQ", authDomain: "ghost-chat-e2ee.firebaseapp.com", projectId: "ghost-chat-e2ee", storageBucket: "ghost-chat-e2ee.firebasestorage.app", messagingSenderId: "951286040813", appId: "1:951286040813:web:5f848f381cdcedaa6de4e4" };
        const STUN_SERVERS = { iceServers: [{ urls: ['stun:stun1.l.google.com:19302', 'stun:stun2.l.google.com:19302'] }] };

        const App = () => {
            const [fbReady, setFbReady] = React.useState(false);
            const [fbModules, setFbModules] = React.useState(null);
            const [identity, setIdentity] = React.useState(null);
            const [authView, setAuthView] = React.useState("choice"); 
            const [sysError, setSysError] = React.useState(null);
            const [loadingState, setLoadingState] = React.useState("");
            
            // Core Chat
            const [friends, setFriends] = React.useState([]);
            const [activeChat, setActiveChat] = React.useState(null);
            const [messages, setMessages] = React.useState([]);
            const [decryptedCache, setDecryptedCache] = React.useState({});
            const [inputText, setInputText] = React.useState('');

            // Story State
            const [stories, setStories] = React.useState([]);
            const [storyMode, setStoryMode] = React.useState(null); // 'create' | 'view'
            const [viewingStoryIdx, setViewingStoryIdx] = React.useState(0);
            const [activeStoryGroup, setActiveStoryGroup] = React.useState([]); // Stories from one user
            const [storyProgress, setStoryProgress] = React.useState(0);
            const storyIntervalRef = React.useRef(null);

            // Creator State
            const [creatorType, setCreatorType] = React.useState('camera'); // 'camera' | 'text'
            const [creatorFilter, setCreatorFilter] = React.useState('filter-normal');
            const [creatorText, setCreatorText] = React.useState('');
            const [creatorBg, setCreatorBg] = React.useState('bg-gradient-to-tr from-blue-600 to-purple-600');
            const [isRecordingStory, setIsRecordingStory] = React.useState(false);
            const [recordedMedia, setRecordedMedia] = React.useState(null); // {blob, type}
            const creatorVideoRef = React.useRef(null);
            const creatorStreamRef = React.useRef(null);
            const storyMediaRecorderRef = React.useRef(null);
            const storyChunksRef = React.useRef([]);
            
            const [toast, setToast] = React.useState(null);
            const [setupName, setSetupName] = React.useState("");
            const [recoveryKeyInput, setRecoveryKeyInput] = React.useState("");

            const showToast = (msg, icon = "ph-info") => { setToast({ msg, icon }); setTimeout(() => setToast(null), 3000); };

            React.useEffect(() => {
                const initSystem = async () => {
                    try {
                        setLoadingState("Booting Infrastructure...");
                        const importModule = new Function('url', 'return import(url)');
                        const fbApp = await importModule('https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js');
                        const fbAuth = await importModule('https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js');
                        const fbDb = await importModule('https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js');
                        const fbStorage = await importModule('https://www.gstatic.com/firebasejs/11.6.1/firebase-storage.js');
                        
                        const app = !fbApp.getApps().length ? fbApp.initializeApp(firebaseConfig) : fbApp.getApp();
                        const auth = fbAuth.getAuth(app);
                        const db = fbDb.getFirestore(app);
                        const storage = fbStorage.getStorage(app);

                        setFbModules({ auth, db, storage, fbAuth, fbDb, fbStorage });
                        await fbAuth.setPersistence(auth, fbAuth.browserLocalPersistence);
                        await fbAuth.signInAnonymously(auth);

                        fbAuth.onAuthStateChanged(auth, async (u) => {
                            if (u) {
                                let localData = await LocalDB.getIdentity();
                                if (localData) {
                                    try {
                                        const privKey = await CryptoUtils.importPrivateKey(localData.privateKeyJWK);
                                        setIdentity({ code: localData.code, privateKey: privKey, publicKeyJWK: localData.publicKeyJWK, displayName: localData.displayName });
                                        setAuthView("main");
                                    } catch (e) { await LocalDB.wipeData(); }
                                }
                                setFbReady(true); setLoadingState("");
                            }
                        });
                    } catch (err) { setSysError(`BOOT_FAILED: ${err.message}`); }
                };
                initSystem();
            }, []);

            // Fetch Contacts & Stories
            React.useEffect(() => {
                if (!fbReady || !identity || authView !== "main") return;
                const { db, fbDb } = fbModules;
                
                // Contacts
                const unsubContacts = fbDb.onSnapshot(fbDb.collection(db, 'users', identity.code, 'contacts'), (snap) => setFriends(snap.docs.map(d => d.data())));

                // Stories (Fetch stories where I am sender OR I am in the encryptedKeys map)
                const twentyFourHoursAgo = Date.now() - (24 * 60 * 60 * 1000);
                const storiesQuery = fbDb.query(fbDb.collection(db, 'stories'), fbDb.where('expiresAt', '>', Date.now()));
                
                const unsubStories = fbDb.onSnapshot(storiesQuery, async (snap) => {
                    let fetchedStories = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    // Filter: I am sender, OR I have a key
                    fetchedStories = fetchedStories.filter(s => s.sender === identity.code || s.encryptedKeys[identity.code]);
                    
                    // Group by sender
                    const grouped = {};
                    fetchedStories.forEach(s => {
                        if (!grouped[s.sender]) grouped[s.sender] = [];
                        grouped[s.sender].push(s);
                    });
                    
                    const finalStories = [];
                    for (let sender in grouped) {
                        grouped[sender].sort((a,b) => a.timestamp - b.timestamp);
                        const friendData = sender === identity.code ? identity : friends.find(f => f.code === sender);
                        if (friendData) {
                            finalStories.push({
                                senderCode: sender,
                                displayName: friendData.displayName,
                                items: grouped[sender]
                            });
                        }
                    }
                    // Sort: My stories first, then others by latest
                    finalStories.sort((a, b) => {
                        if (a.senderCode === identity.code) return -1;
                        if (b.senderCode === identity.code) return 1;
                        return b.items[b.items.length-1].timestamp - a.items[a.items.length-1].timestamp;
                    });
                    
                    setStories(finalStories);
                });

                return () => { unsubContacts(); unsubStories(); };
            }, [fbReady, identity, authView, friends.length]); // Added friends.length to re-run when friends load

            // --- STORY UPLOAD LOGIC ---
            const publishStory = async (type, mediaBlob = null, textContent = null) => {
                setLoadingState("Encrypting Story...");
                const { db, fbDb, storage, fbStorage } = fbModules;
                
                try {
                    const { rawKey, cryptoKey } = await CryptoUtils.generateStoryKey();
                    let payloadData = {};

                    if (type === 'text') {
                        const encryptedText = await CryptoUtils.encryptText(textContent, cryptoKey);
                        payloadData = { isText: true, iv: encryptedText.iv, data: encryptedText.data, bg: creatorBg };
                    } else {
                        // Max 5 minutes Check (aprox via blob size if needed, but UI enforces it)
                        if (mediaBlob.size > 25000000) throw new Error("File terlalu besar. Max ~25MB untuk E2EE stabil.");
                        
                        const arrayBuffer = await mediaBlob.arrayBuffer();
                        const { iv, blob } = await CryptoUtils.encryptStoryMedia(arrayBuffer, cryptoKey);
                        
                        const storageRef = fbStorage.ref(storage, `stories/${identity.code}_${Date.now()}`);
                        await fbStorage.uploadBytes(storageRef, blob);
                        const url = await fbStorage.getDownloadURL(storageRef);
                        
                        payloadData = { isText: false, url, iv, mediaType: type, filter: creatorFilter };
                    }

                    // Wrap key for ALL friends + Self
                    const encryptedKeys = {};
                    const targets = [...friends, identity];
                    for (let target of targets) {
                        const sharedSecret = await CryptoUtils.deriveSharedSecret(identity.privateKey, target.publicKeyJWK);
                        encryptedKeys[target.code] = await CryptoUtils.wrapKeyForFriend(rawKey, sharedSecret);
                    }

                    await fbDb.addDoc(fbDb.collection(db, 'stories'), {
                        sender: identity.code,
                        timestamp: Date.now(),
                        expiresAt: Date.now() + (24 * 60 * 60 * 1000), // 24H
                        encryptedKeys,
                        payload: payloadData
                    });

                    showToast("Story Dibagikan", "ph-check-circle");
                    closeStoryCreator();
                } catch (e) {
                    showToast("Gagal Upload: " + e.message, "ph-warning");
                    console.error(e);
                } finally {
                    setLoadingState("");
                }
            };

            // --- STORY CAMERA LOGIC ---
            const openStoryCreator = async () => {
                setStoryMode('create'); setRecordedMedia(null); setCreatorType('camera');
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
                    creatorStreamRef.current = stream;
                    setTimeout(() => { if (creatorVideoRef.current) creatorVideoRef.current.srcObject = stream; }, 100);
                } catch (e) { showToast("Gagal akses kamera", "ph-warning"); setCreatorType('text'); }
            };

            const closeStoryCreator = () => {
                if (creatorStreamRef.current) creatorStreamRef.current.getTracks().forEach(t => t.stop());
                setStoryMode(null); setIsRecordingStory(false);
            };

            const capturePhoto = () => {
                const canvas = document.createElement('canvas');
                canvas.width = creatorVideoRef.current.videoWidth; canvas.height = creatorVideoRef.current.videoHeight;
                canvas.getContext('2d').drawImage(creatorVideoRef.current, 0, 0);
                canvas.toBlob(blob => setRecordedMedia({ blob, type: 'image' }), 'image/jpeg', 0.8);
                if (creatorStreamRef.current) creatorStreamRef.current.getTracks().forEach(t => t.stop());
            };

            const startStoryVideo = () => {
                storyChunksRef.current = [];
                // STRICT CONSTRAINT: 500kbps to ensure 5 mins fits in memory (~18MB)
                const options = { mimeType: 'video/webm;codecs=vp8,opus', videoBitsPerSecond: 500000 };
                storyMediaRecorderRef.current = new MediaRecorder(creatorStreamRef.current, options);
                storyMediaRecorderRef.current.ondataavailable = e => { if(e.data.size > 0) storyChunksRef.current.push(e.data); };
                storyMediaRecorderRef.current.onstop = () => {
                    const blob = new Blob(storyChunksRef.current, { type: 'video/webm' });
                    setRecordedMedia({ blob, type: 'video' });
                    if (creatorStreamRef.current) creatorStreamRef.current.getTracks().forEach(t => t.stop());
                };
                storyMediaRecorderRef.current.start();
                setIsRecordingStory(true);
                
                // HARD LIMIT 5 MINUTES (300,000 ms)
                setTimeout(() => {
                    if(storyMediaRecorderRef.current?.state === "recording") stopStoryVideo();
                }, 300000); 
            };
            const stopStoryVideo = () => {
                if(storyMediaRecorderRef.current?.state === "recording") {
                    storyMediaRecorderRef.current.stop(); setIsRecordingStory(false);
                }
            };

            // --- STORY VIEWER LOGIC ---
            const [currentStoryContent, setCurrentStoryContent] = React.useState(null);

            const openStoryViewer = (group) => {
                setActiveStoryGroup(group.items); setViewingStoryIdx(0); setStoryMode('view');
                loadAndDecryptStory(group.items[0], group.senderCode);
            };

            const loadAndDecryptStory = async (storyDoc, senderCode) => {
                setCurrentStoryContent(null); setStoryProgress(0);
                if(storyIntervalRef.current) clearInterval(storyIntervalRef.current);

                try {
                    // 1. Get encrypted key wrapper for ME
                    const myKeyWrapper = storyDoc.encryptedKeys[identity.code];
                    if(!myKeyWrapper) throw new Error("No key");

                    // 2. Derive Shared Secret to unwrap StoryKey
                    const targetData = senderCode === identity.code ? identity : friends.find(f => f.code === senderCode);
                    const sharedSecret = await CryptoUtils.deriveSharedSecret(identity.privateKey, targetData.publicKeyJWK);
                    const rawStoryKeyArray = await CryptoUtils.unwrapKeyFromFriend(myKeyWrapper, sharedSecret);

                    // 3. Decrypt Content
                    const payload = storyDoc.payload;
                    if (payload.isText) {
                        const cryptoKey = await crypto.subtle.importKey("raw", new Uint8Array(rawStoryKeyArray), "AES-GCM", false, ["decrypt"]);
                        const decText = await crypto.subtle.decrypt({ name: "AES-GCM", iv: new Uint8Array(payload.iv) }, cryptoKey, new Uint8Array(payload.data));
                        setCurrentStoryContent({ type: 'text', text: new TextDecoder().decode(decText), bg: payload.bg });
                        startStoryTimer(5000); // 5 sec for text
                    } else {
                        // Fetch Blob from Storage URL
                        const response = await fetch(payload.url);
                        const encryptedBlob = await response.blob();
                        const decryptedBuffer = await CryptoUtils.decryptStoryMedia(encryptedBlob, payload.iv, rawStoryKeyArray);
                        
                        let mime = payload.mediaType === 'video' ? 'video/webm' : 'image/jpeg';
                        const url = URL.createObjectURL(new Blob([decryptedBuffer], {type: mime}));
                        setCurrentStoryContent({ type: payload.mediaType, url, filter: payload.filter });
                        
                        if(payload.mediaType === 'image') startStoryTimer(5000);
                        // For video, timer is handled by video onended event
                    }
                } catch (e) {
                    setCurrentStoryContent({ type: 'error', text: "Gagal dekripsi." });
                    startStoryTimer(3000);
                }
            };

            const startStoryTimer = (duration) => {
                let start = Date.now();
                storyIntervalRef.current = setInterval(() => {
                    let elapsed = Date.now() - start;
                    let prog = (elapsed / duration) * 100;
                    if (prog >= 100) { clearInterval(storyIntervalRef.current); nextStory(); }
                    else { setStoryProgress(prog); }
                }, 50);
            };

            const nextStory = () => {
                if (viewingStoryIdx < activeStoryGroup.length - 1) {
                    setViewingStoryIdx(v => v + 1);
                    loadAndDecryptStory(activeStoryGroup[viewingStoryIdx + 1], activeStoryGroup[0].sender);
                } else { closeStoryViewer(); }
            };
            const prevStory = () => {
                if (viewingStoryIdx > 0) {
                    setViewingStoryIdx(v => v - 1);
                    loadAndDecryptStory(activeStoryGroup[viewingStoryIdx - 1], activeStoryGroup[0].sender);
                }
            };
            const closeStoryViewer = () => {
                if(storyIntervalRef.current) clearInterval(storyIntervalRef.current);
                setStoryMode(null); setActiveStoryGroup([]);
            };

            // Render Helpers
            const handleRegister = async (e) => { e.preventDefault(); /* Sama seperti V6.2 */ };
            // ... (Fungsi auth lainnya sengaja diringkas untuk space UI, mengacu pada struktur logika yg sudah paten)

            if (!fbReady || loadingState) return (
                <div className="h-screen flex flex-col items-center justify-center bg-[var(--bg-dark)] z-[99999] absolute inset-0">
                    <i className="ph ph-spinner-gap animate-spin text-4xl mb-4 text-[var(--primary)]"></i>
                    <p className="text-[var(--text-muted)] text-sm font-mono text-center px-6">{loadingState}</p>
                    <p className="text-[10px] text-[var(--danger)] mt-4 max-w-xs text-center">Peringatan Arsitektur: Enkripsi E2EE memakan CPU. Dilarang memuat ulang saat proses ini.</p>
                </div>
            );

            return (
                <div className="flex h-screen w-full overflow-hidden relative">
                    {/* TOAST */}
                    {toast && (
                        <div className="absolute top-4 left-1/2 transform -translate-x-1/2 z-[100] toast-enter w-[90%] max-w-[320px]">
                            <div className="glass-panel px-5 py-3 rounded-full flex items-center gap-3 shadow-lg border border-white/10 justify-center">
                                <i className={`text-xl text-[var(--primary)] ${toast.icon}`}></i><span className="text-sm font-semibold truncate">{toast.msg}</span>
                            </div>
                        </div>
                    )}

                    {/* STORY CREATOR OVERLAY */}
                    {storyMode === 'create' && (
                        <div className="fixed inset-0 z-[100] bg-black flex flex-col modal-enter">
                            <div className="absolute top-12 left-5 z-50">
                                <button onClick={closeStoryCreator} className="w-10 h-10 bg-black/50 rounded-full flex items-center justify-center text-white"><i className="ph-bold ph-x text-xl"></i></button>
                            </div>
                            
                            {!recordedMedia ? (
                                <div className="flex-1 relative flex flex-col">
                                    {creatorType === 'camera' ? (
                                        <video ref={creatorVideoRef} autoPlay playsInline muted className={`absolute inset-0 w-full h-full object-cover ${creatorFilter}`}></video>
                                    ) : (
                                        <div className={`absolute inset-0 w-full h-full flex items-center justify-center p-8 ${creatorBg}`}>
                                            <textarea autoFocus value={creatorText} onChange={e=>setCreatorText(e.target.value)} placeholder="Tulis rahasia..." className="w-full bg-transparent text-white text-3xl font-bold text-center outline-none resize-none placeholder-white/50" rows="5"></textarea>
                                        </div>
                                    )}

                                    {/* Creator Controls */}
                                    <div className="absolute bottom-10 w-full flex flex-col items-center gap-6 z-50">
                                        {creatorType === 'camera' && (
                                            <div className="flex gap-3 overflow-x-auto w-full px-6 pb-2 hide-scrollbar justify-center">
                                                {['filter-normal', 'filter-iphone', 'filter-vintage', 'filter-bw', 'filter-cyber'].map(f => (
                                                    <button key={f} onClick={() => setCreatorFilter(f)} className={`w-12 h-12 rounded-full border-2 ${creatorFilter===f ? 'border-white' : 'border-transparent'} bg-black/50 text-xs font-bold text-white capitalize`}>{f.split('-')[1]}</button>
                                                ))}
                                            </div>
                                        )}
                                        {creatorType === 'text' && (
                                            <div className="flex gap-3 overflow-x-auto w-full px-6 pb-2 hide-scrollbar justify-center">
                                                {['bg-gradient-to-tr from-blue-600 to-purple-600', 'bg-gradient-to-tr from-gray-900 to-black', 'bg-gradient-to-br from-pink-500 to-orange-400', 'bg-gradient-to-bl from-green-500 to-teal-700'].map((bg,i) => (
                                                    <button key={i} onClick={() => setCreatorBg(bg)} className={`w-10 h-10 rounded-full border-2 ${creatorBg===bg ? 'border-white' : 'border-transparent'} ${bg}`}></button>
                                                ))}
                                            </div>
                                        )}

                                        <div className="flex items-center gap-8">
                                            <button onClick={()=>setCreatorType('text')} className={`text-white font-bold text-sm ${creatorType==='text'?'opacity-100':'opacity-50'}`}>Aa</button>
                                            
                                            {creatorType === 'camera' ? (
                                                <div 
                                                    onPointerDown={startStoryVideo} 
                                                    onPointerUp={stopStoryVideo}
                                                    onClick={capturePhoto}
                                                    className={`w-20 h-20 rounded-full border-4 border-white flex items-center justify-center transition-all ${isRecordingStory ? 'scale-125 bg-red-500/50' : 'bg-transparent'}`}>
                                                    <div className="w-16 h-16 bg-white rounded-full"></div>
                                                </div>
                                            ) : (
                                                <button onClick={() => publishStory('text', null, creatorText)} disabled={!creatorText.trim()} className="w-16 h-16 bg-white text-black rounded-full flex items-center justify-center font-bold text-xl"><i className="ph-bold ph-paper-plane-right"></i></button>
                                            )}

                                            <button onClick={()=>setCreatorType('camera')} className={`text-white font-bold text-sm ${creatorType==='camera'?'opacity-100':'opacity-50'}`}><i className="ph-bold ph-camera text-xl"></i></button>
                                        </div>
                                        {creatorType === 'camera' && <p className="text-white/70 text-xs font-mono">Tap foto | Tahan video (Max 5M)</p>}
                                    </div>
                                </div>
                            ) : (
                                <div className="flex-1 relative bg-black">
                                    {recordedMedia.type === 'video' ? (
                                        <video src={URL.createObjectURL(recordedMedia.blob)} autoPlay loop playsInline className={`w-full h-full object-cover ${creatorFilter}`}></video>
                                    ) : (
                                        <img src={URL.createObjectURL(recordedMedia.blob)} className={`w-full h-full object-cover ${creatorFilter}`} />
                                    )}
                                    <div className="absolute bottom-10 right-6 flex gap-4">
                                        <button onClick={()=>setRecordedMedia(null)} className="w-14 h-14 bg-black/60 rounded-full text-white flex items-center justify-center"><i className="ph-bold ph-trash text-xl"></i></button>
                                        <button onClick={()=>publishStory(recordedMedia.type, recordedMedia.blob)} className="w-14 h-14 bg-[var(--primary)] rounded-full text-white flex items-center justify-center"><i className="ph-bold ph-paper-plane-right text-xl"></i></button>
                                    </div>
                                </div>
                            )}
                        </div>
                    )}

                    {/* STORY VIEWER OVERLAY */}
                    {storyMode === 'view' && (
                        <div className="fixed inset-0 z-[100] bg-black flex flex-col">
                            {/* Progress Bars */}
                            <div className="absolute top-12 left-0 w-full px-2 flex gap-1 z-50">
                                {activeStoryGroup.map((_, idx) => (
                                    <div key={idx} className="h-1 flex-1 bg-white/30 rounded-full overflow-hidden">
                                        <div className="h-full bg-white transition-all duration-50" style={{ width: idx < viewingStoryIdx ? '100%' : idx === viewingStoryIdx ? `${storyProgress}%` : '0%' }}></div>
                                    </div>
                                ))}
                            </div>
                            
                            {/* Header */}
                            <div className="absolute top-16 left-4 z-50 flex items-center gap-3">
                                <div className="w-10 h-10 rounded-full bg-gray-800 border border-white flex items-center justify-center text-white font-bold">{activeStoryGroup[0]?.sender === identity?.code ? 'Me' : friends.find(f=>f.code===activeStoryGroup[0]?.sender)?.displayName.charAt(0)}</div>
                                <span className="text-white font-bold text-sm shadow-black drop-shadow-md">{activeStoryGroup[0]?.sender === identity?.code ? 'My Story' : friends.find(f=>f.code===activeStoryGroup[0]?.sender)?.displayName}</span>
                                <span className="text-white/70 text-xs">{new Date(activeStoryGroup[viewingStoryIdx]?.timestamp).getHours()}:{String(new Date(activeStoryGroup[viewingStoryIdx]?.timestamp).getMinutes()).padStart(2,'0')}</span>
                            </div>

                            <button onClick={closeStoryViewer} className="absolute top-16 right-4 z-50 w-10 h-10 text-white drop-shadow-md"><i className="ph-bold ph-x text-2xl"></i></button>

                            {/* Content */}
                            <div className="flex-1 relative flex items-center justify-center">
                                {!currentStoryContent ? (
                                    <i className="ph ph-spinner animate-spin text-4xl text-white"></i>
                                ) : currentStoryContent.type === 'text' ? (
                                    <div className={`w-full h-full flex items-center justify-center p-8 ${currentStoryContent.bg}`}>
                                        <p className="text-white text-3xl font-bold text-center">{currentStoryContent.text}</p>
                                    </div>
                                ) : currentStoryContent.type === 'image' ? (
                                    <img src={currentStoryContent.url} className={`w-full h-full object-cover ${currentStoryContent.filter}`} />
                                ) : currentStoryContent.type === 'video' ? (
                                    <video src={currentStoryContent.url} autoPlay playsInline onEnded={nextStory} className={`w-full h-full object-cover ${currentStoryContent.filter}`}></video>
                                ) : (
                                    <div className="text-white font-mono">{currentStoryContent.text}</div>
                                )}
                            </div>

                            {/* Navigation Taps */}
                            <div className="absolute inset-0 z-40 flex">
                                <div className="w-1/3 h-full" onClick={prevStory}></div>
                                <div className="w-2/3 h-full" onClick={nextStory}></div>
                            </div>
                        </div>
                    )}

                    {/* MAIN CHAT UI DENGAN STORY TRAY */}
                    {authView === "main" && (
                        <div className="flex h-screen w-full relative">
                            <div className={`w-full md:w-[360px] flex-shrink-0 flex flex-col border-r border-[var(--border)] transition-transform z-10 ${activeChat ? '-translate-x-full md:translate-x-0 absolute md:relative h-full' : 'translate-x-0 relative h-full'}`}>
                                <div className="glass-panel px-5 pt-14 pb-2 sticky top-0 z-20 border-b border-[var(--border)]">
                                    <div className="flex justify-between items-end mb-4">
                                        <h1 className="text-4xl font-bold tracking-tight">Ghost</h1>
                                        <button onClick={() => { localStorage.clear(); window.location.reload(); }} className="w-10 h-10 rounded-full bg-red-500/20 text-[var(--danger)] flex items-center justify-center"><i className="ph-bold ph-power"></i></button>
                                    </div>
                                    
                                    {/* STORY TRAY */}
                                    <div className="flex gap-4 overflow-x-auto hide-scrollbar pb-3 pt-1">
                                        <div className="flex flex-col items-center gap-1 cursor-pointer" onClick={openStoryCreator}>
                                            <div className="w-16 h-16 rounded-full border-2 border-[var(--border)] border-dashed flex items-center justify-center text-[var(--primary)] bg-[var(--surface)] relative">
                                                <i className="ph-bold ph-plus text-2xl"></i>
                                            </div>
                                            <span className="text-[11px] font-semibold text-[var(--text-muted)]">Add Story</span>
                                        </div>
                                        
                                        {stories.map(group => (
                                            <div key={group.senderCode} className="flex flex-col items-center gap-1 cursor-pointer" onClick={() => openStoryViewer(group)}>
                                                <div className="story-ring">
                                                    <div className="w-[58px] h-[58px] story-avatar-inner flex items-center justify-center text-white font-bold text-xl">
                                                        {group.displayName.charAt(0)}
                                                    </div>
                                                </div>
                                                <span className="text-[11px] font-semibold truncate w-16 text-center">{group.senderCode === identity.code ? 'Anda' : group.displayName}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto hide-scrollbar">
                                    {friends.map((f) => (
                                        <div key={f.code} onClick={() => setActiveChat(f)} className="cursor-pointer px-5 py-3 flex items-center gap-4 hover:bg-white/5 border-b border-[var(--border)]">
                                            <div className="w-14 h-14 rounded-full bg-[var(--surface)] border border-white/10 flex items-center justify-center font-bold text-xl text-white">{f.displayName.charAt(0)}</div>
                                            <div className="flex-1"><h3 className="font-bold text-[18px]">{f.displayName}</h3><p className="text-[14px] text-[var(--text-muted)] font-mono">Tap untuk chat E2EE</p></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            
                            {/* CHAT AREA PLACEHOLDER (Menjaga struktur tanpa kode panjang) */}
                            <div className={`flex-1 flex flex-col slide-panel absolute md:relative w-full h-full z-20 bg-[var(--bg-dark)] ${activeChat ? 'translate-x-0' : 'translate-x-full md:translate-x-0'}`}>
                                {activeChat && (
                                    <div className="w-full h-full flex items-center justify-center flex-col">
                                        <button onClick={()=>setActiveChat(null)} className="md:hidden absolute top-12 left-4 w-10 h-10 bg-[var(--surface)] rounded-full text-white"><i className="ph-bold ph-caret-left"></i></button>
                                        <i className="ph-fill ph-lock-key text-5xl text-[var(--border)] mb-4"></i>
                                        <p className="text-[var(--text-muted)]">Ruang obrolan dengan {activeChat.displayName}</p>
                                        <p className="text-xs text-white/30 font-mono mt-2">(UI Chat disederhanakan di snippet ini untuk fokus pada arsitektur Story E2EE)</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root')); root.render(<App />);
    </script>
</body>
</html>
